<!-- WORKSPACE — VS Code-style Design Studio -->
<div id="viewWorkspace" class="view">
  <div class="ws-layout" id="wsLayout">
    <!-- Topbar -->
    <div class="ws-topbar">
      <span class="ws-topbar-logo">MagicEditor</span>
      <span class="ws-topbar-title" id="wsProjectTitle">Design Workspace</span>
      <div class="ws-topbar-controls">
        <span class="ws-topbar-save" id="wsSaveIndicator">● Saved</span>
        <div class="ws-topbar-divider"></div>
        <button class="ws-topbar-btn mobile-toggle" onclick="document.querySelector('.ws-sidebar').classList.toggle('open')" style="display:none;" title="Menu">☰ Menu</button>
        <button class="ws-topbar-btn mobile-toggle" onclick="document.querySelector('.ws-ai').classList.toggle('open')" style="display:none;" title="AI">✦ AI</button>
        <button class="ws-topbar-btn" onclick="wsUndo()" title="Undo">↶ Undo</button>
        <button class="ws-topbar-btn" onclick="wsRedo()" title="Redo">↷ Redo</button>
        <div class="ws-topbar-divider"></div>
        <button class="ws-topbar-btn" onclick="wsToggleGuides()" id="wsGuidesBtn">☐ Guides</button>
        <button class="ws-topbar-btn" onclick="wsToggleSpread()" id="wsSpreadBtn">⊞ Spread</button>
        <div class="ws-topbar-divider"></div>
        <button class="ws-topbar-btn accent" onclick="wsGeneratePreview()">▶ Generate</button>
        <button class="ws-topbar-btn danger" onclick="closeWorkspace()">✕ Close</button>
      </div>
    </div>

    <!-- Left Sidebar -->
    <aside class="ws-sidebar">
      <!-- Pages Panel -->
      <div class="ws-panel" id="wsPanelPages">
        <div class="ws-panel-header" onclick="wsTogglePanel('wsPanelPages')">
          <span>📄 Pages</span><span class="ws-chevron">▼</span>
        </div>
        <div class="ws-panel-body" id="wsPageList"></div>
      </div>
      <!-- Export Panel -->
      <div class="ws-panel" id="wsPanelExport">
        <div class="ws-panel-header" onclick="wsTogglePanel('wsPanelExport')">
          <span>⬇ Export</span><span class="ws-chevron">▼</span>
        </div>
        <div class="ws-panel-body">
          <button class="ws-export-btn" onclick="wsExportPrintPDF()">
            <span class="ws-export-icon">🖨</span>
            <span>Print-Ready PDF<span class="ws-export-desc">High-res with bleed &amp; crop marks</span></span>
          </button>
          <button class="ws-export-btn" onclick="wsExportEditable()">
            <span class="ws-export-icon">📦</span>
            <span>Editable Package<span class="ws-export-desc">SVG pages + project JSON</span></span>
          </button>
          <button class="ws-export-btn" onclick="exportMasterMagazine()">
            <span class="ws-export-icon">📁</span>
            <span>Master ZIP<span class="ws-export-desc">All content + photos organized</span></span>
          </button>
          <button class="ws-export-btn" onclick="wsExportWord()">
            <span class="ws-export-icon">📝</span>
            <span>Word Document<span class="ws-export-desc">Full content for printing press editing</span></span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Center Canvas -->
    <div class="ws-canvas" id="wsCanvas">
      <!-- Page nav overlay -->
      <div class="ws-page-nav">
        <button class="ws-page-nav-btn" onclick="wsPrevPage()" id="wsBtnPrev" disabled>‹</button>
        <span class="ws-page-nav-info" id="wsPageNavInfo">— / —</span>
        <button class="ws-page-nav-btn" onclick="wsNextPage()" id="wsBtnNext">›</button>
      </div>
      <!-- Magazine page renders here -->
      <div id="wsPageContainer"></div>
      <!-- Zoom controls overlay -->
      <div class="ws-zoom-bar">
        <button class="ws-zoom-btn" onclick="wsSetZoom(wsZoom-25)">−</button>
        <button class="ws-zoom-btn" onclick="wsSetZoom(50)">50</button>
        <button class="ws-zoom-btn" onclick="wsSetZoom(75)">75</button>
        <span class="ws-zoom-level" id="wsZoomLevel">100%</span>
        <button class="ws-zoom-btn" onclick="wsSetZoom(100)">Fit</button>
        <button class="ws-zoom-btn" onclick="wsSetZoom(150)">150</button>
        <button class="ws-zoom-btn" onclick="wsSetZoom(wsZoom+25)">+</button>
      </div>
    </div>

    <!-- Right AI Panel -->
    <div class="ws-ai">
      <div class="ws-ai-header">
        <div class="ws-ai-title">✦ AI Design Assistant</div>
        <div class="ws-ai-selectors">
          <select class="ws-ai-select" id="wsAIModel" title="AI Model">
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
            <option value="google/gemini-2.0-pro-exp-02-05">Gemini 2.0 Pro</option>
            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            <option value="deepseek/deepseek-chat">DeepSeek V3</option>
            <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
          </select>
          <select class="ws-ai-select" id="wsAITask" title="Task Type">
            <option value="design">🎨 Design</option>
            <option value="reasoning">🧠 Reasoning</option>
            <option value="proofread">📝 Proofread</option>
            <option value="image">🖼 Image Analysis</option>
          </select>
        </div>
      </div>
      <!-- Chat area -->
      <div class="ws-ai-chat" id="wsAIChat">
        <div class="ws-ai-msg system">Start a conversation — describe what you want to change.</div>
      </div>
      <!-- Quick commands -->
      <div class="ws-ai-quick">
        <button class="ws-ai-quick-btn" onclick="wsAIQuick('Make this page more premium')">✨ Premium</button>
        <button class="ws-ai-quick-btn" onclick="wsAIQuick('Improve alignment and spacing')">📐 Align</button>
        <button class="ws-ai-quick-btn" onclick="wsAIQuick('Reduce clutter and simplify')">🧹 Simplify</button>
        <button class="ws-ai-quick-btn" onclick="wsAIQuick('Balance all pages')">⚖ Balance</button>
        <button class="ws-ai-quick-btn" onclick="wsAIQuick('Prepare for print: add bleed, check resolution')">🖨 Print-ready</button>
        <button class="ws-ai-quick-btn" onclick="wsAIQuick('Match the uploaded sample style')">🎯 Match Sample</button>
      </div>
      <!-- Image upload for sample replication -->
      <div class="ws-ai-upload">
        <div class="ws-ai-upload-zone" onclick="document.getElementById('wsAISampleInput').click()">
          <input type="file" id="wsAISampleInput" accept="image/*,.pdf" style="display:none;" onchange="wsAIUploadSample(event)"/>
          <span style="font-size:20px;">📎</span>
          <p>Upload design sample for style replication</p>
        </div>
        <div class="ws-ai-upload-preview" id="wsAISamplePreview">
          <img id="wsAISampleImg" src="" alt="Sample"/>
        </div>
      </div>
      <!-- Input area -->
      <div class="ws-ai-input">
        <textarea class="ws-ai-textarea" id="wsAIInput" placeholder="Describe what you want to change..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();wsAISend();}"></textarea>
        <button class="ws-ai-send" onclick="wsAISend()" title="Send">➤</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="ws-statusbar">
      <div class="ws-statusbar-item"><div class="ws-statusbar-dot ok" id="wsStatusDot"></div><span id="wsStatusText">Ready</span></div>
      <div class="ws-statusbar-sep"></div>
      <div class="ws-statusbar-item" id="wsStatusPages">0 pages</div>
      <div class="ws-statusbar-sep"></div>
      <div class="ws-statusbar-item" id="wsStatusZoom">100%</div>
      <div class="ws-statusbar-sep"></div>
      <div class="ws-statusbar-item" id="wsStatusFinalized">0 approved</div>
      <div style="flex:1;"></div>
      <div class="ws-statusbar-item">MagicEditor Workspace v1.0</div>
    </div>
  </div>
</div>
