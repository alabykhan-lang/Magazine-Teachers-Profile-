<!-- CUSTOM FIELD MODAL -->
<div id="customFieldModal" class="modal-overlay">
  <div class="modal-box">
    <h2 id="cfmTitle">Add Custom Field</h2>
    <p class="modal-sub">Define a new field to appear on the selected form.</p>
    <div class="field-form">
      <div><label>Field label</label><input type="text" id="cfmLabel" placeholder="e.g. State of origin" maxlength="80"/></div>
      <div><label>Field type</label>
        <select id="cfmType" onchange="updateCustomFieldModalOptions()">
          <option value="text">Short text</option><option value="textarea">Long text</option>
          <option value="select">Dropdown</option><option value="date">Date</option>
          <option value="checkbox">Yes/No</option><option value="number">Number</option>
        </select>
      </div>
      <div id="cfmOptionsWrap" style="display:none;"><label>Dropdown options</label><input type="text" id="cfmOptions" placeholder="Option 1, Option 2"/><div class="options-hint">Separate with commas.</div></div>
      <div><label>Placeholder (optional)</label><input type="text" id="cfmPlaceholder" maxlength="100"/></div>
      <div class="row-check"><input type="checkbox" id="cfmRequired"/><label for="cfmRequired" style="margin-bottom:0;cursor:pointer;">Required field</label></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCustomFieldModal()">Cancel</button>
      <button class="btn btn-primary" id="cfmSaveBtn" onclick="saveCustomField()">Save Field</button>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div id="reviewModal" class="modal-overlay">
  <div class="modal-box">
    <h2 id="reviewTitle">Review Submission</h2>
    <p class="modal-sub" id="reviewSub">Add an optional note with your decision.</p>
    <textarea id="reviewNote" placeholder="Feedback or reason (optional)"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeReviewModal()">Cancel</button>
      <button class="btn btn-primary" id="reviewConfirm">Confirm</button>
    </div>
  </div>
</div>

<!-- RENAME MODAL -->
<div id="renameModal" class="modal-overlay">
  <div class="modal-box" style="max-width:420px;">
    <h2>Rename Section</h2>
    <p class="modal-sub" id="renameModalSub">Enter the new name.</p>
    <input type="text" id="renameInput" placeholder="New section name" maxlength="60" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:'Lato',sans-serif;margin-top:12px;"/>
    <div class="modal-actions">
      <button class="btn" onclick="closeRenameModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRename()">Rename</button>
    </div>
  </div>
</div>

  <!-- Create Form Modal -->
  <div class="modal-overlay" id="createFormModal">
    <div class="modal-box">
      <h3 id="cfmFormTitle" style="margin-bottom:15px;">Create New Form</h3>
      <div class="settings-row" style="flex-direction:column;align-items:flex-start;">
        <label>Form Internal ID (e.g. debate_club)</label>
        <input type="text" id="crfId" placeholder="letters and underscores only" style="width:100%;" oninput="this.value=this.value.replace(/[^a-z0-9_]/g,'')"/>
      </div>
      <div class="settings-row" style="flex-direction:column;align-items:flex-start;">
        <label>Form Name (e.g. Debate Club)</label>
        <input type="text" id="crfName" placeholder="Public facing name" style="width:100%;"/>
      </div>
      <div class="settings-row" style="flex-direction:column;align-items:flex-start;">
        <label>Icon (Emoji)</label>
        <input type="text" id="crfIcon" placeholder="e.g. 🗣️" style="width:100px;"/>
      </div>
      <div class="settings-row" style="flex-direction:column;align-items:flex-start;">
        <label>Form Tag (e.g. Debate)</label>
        <input type="text" id="crfTag" placeholder="Short tag" style="width:100%;"/>
      </div>
      <div class="settings-row" style="flex-direction:column;align-items:flex-start;">
        <label>Subtitle / Description</label>
        <textarea id="crfSubtitle" style="width:100%;font-family:'Lato',sans-serif;padding:8px;" rows="2" placeholder="Description of what this form is for"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
        <button class="btn" onclick="closeCreateFormModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveNewForm()">Create Form</button>
      </div>
    </div>
  </div>
