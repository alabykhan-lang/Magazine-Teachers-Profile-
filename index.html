<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover"/>
<title>MagicEditor v2.0 | Way To Success Standard Schools</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
<style>
  /* Failsafe: auto-show force-open button after 5s via CSS animation */
  @keyframes showForceBtn { from { opacity:0; pointer-events:none; } to { opacity:1; pointer-events:auto; } }
  #bootForceOpen { animation: showForceBtn 0.3s ease 5s forwards; display:block !important; opacity:0; pointer-events:none; }
  /* Failsafe: auto-fade overlay after 12s even if JS fully fails */
  @keyframes fadeOverlay { from { opacity:1; visibility:visible; } to { opacity:0; visibility:hidden; } }
  #bootLoadingOverlay { animation: fadeOverlay 0.6s ease 12s forwards; }
</style>
<style id="ai-custom-css"></style>
<style id="mobile-touch-fix">
  /* Mobile touch fix: ensure all interactive elements register taps */
  button, .form-card, .admin-tab, .editor-tab, .pin-key, .ls-tab,
  [onclick], a, select, input, textarea, label {
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(0,0,0,0.08);
    touch-action: manipulation;
  }
  /* Force boot overlay fully gone after 10s on all devices */
  @keyframes forceHide {
    0%   { opacity: 1; visibility: visible; pointer-events: auto; }
    99%  { opacity: 0; visibility: visible; pointer-events: none; }
    100% { opacity: 0; visibility: hidden;  pointer-events: none; display: none; }
  }
  #bootLoadingOverlay {
    animation: forceHide 0.5s ease 10s forwards !important;
  }
  /* Prevent invisible overlay blocking touch after fade */
  #bootLoadingOverlay[style*="display: none"],
  #bootLoadingOverlay[style*="display:none"],
  #bootLoadingOverlay[style*="visibility: hidden"] {
    pointer-events: none !important;
    display: none !important;
  }
</style>
</head>
<body>
<!-- GLOBAL BOOT LOADING OVERLAY -->
<div id="bootLoadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#1a2744;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:opacity .5s ease,visibility .5s;">
  <div style="width:48px;height:48px;border:4px solid rgba(255,255,255,.1);border-top-color:#7dd4a8;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;"></div>
  <div style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;">MagicEditor</div>
  <div id="bootLoadingStatus" style="font-family:'Lato',sans-serif;font-size:14px;color:rgba(255,255,255,.7);margin-bottom:20px;">Connecting to Cloud...</div>
  <button id="bootForceOpen" onclick="removeBootOverlay()" style="display:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 24px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Lato',sans-serif;">Force Open Dashboard</button>
</div>
<script>
/* Failsafe: remove boot overlay within 10s no matter what */
window.__bootOverlayTimer = setTimeout(function(){
  var ov = document.getElementById('bootLoadingOverlay');
  if(ov && ov.style.display !== 'none'){
    ov.style.opacity='0';
    setTimeout(function(){ ov.style.visibility='hidden'; ov.style.display='none'; }, 600);
    console.warn('[BOOT] Failsafe overlay removal after 10s');
  }
}, 10000);
function removeBootOverlay(){
  clearTimeout(window.__bootOverlayTimer);
  var ov = document.getElementById('bootLoadingOverlay');
  if(!ov) return;
  ov.style.opacity='0';
  ov.style.pointerEvents='none';
  setTimeout(function(){ 
    ov.style.visibility='hidden'; 
    ov.style.display='none'; 
  }, 600);
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     COMPONENT CONTAINERS — loaded from /components/ partials
     Each component is a self-contained HTML partial with all
     its DOM elements. They are fetched and injected at startup.
═══════════════════════════════════════════════════════════ -->

<!-- LANDING PAGE -->
<div id="component-landing"></div>

<!-- FORM VIEW -->
<div id="component-form"></div>

<!-- PRODUCTION DASHBOARD (Admin) -->
<div id="component-admin"></div>

<!-- EDITOR-IN-CHIEF VIEW -->
<div id="component-editor"></div>

<!-- WORKSPACE — VS Code-style Design Studio -->
<div id="component-workspace"></div>

<!-- PIN OVERLAY -->
<div id="component-pin-overlay"></div>

<!-- MODALS (Custom Field, Review, Rename, Create Form) -->
<div id="component-modals"></div>

<!-- SYNC INDICATOR -->
<div id="syncBar" class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncMsg"></span>
</div>

<!-- ═══════════════════════════════════════════════════════════
     COMPONENT LOADER — fetches HTML partials and injects them
     into their respective container divs, then loads script.js
═══════════════════════════════════════════════════════════ -->
<script>
(function(){
  var components = [
    { id: 'component-landing',      file: 'components/landing.html' },
    { id: 'component-form',         file: 'components/form.html' },
    { id: 'component-admin',        file: 'components/admin.html' },
    { id: 'component-editor',       file: 'components/editor.html' },
    { id: 'component-workspace',    file: 'components/workspace.html' },
    { id: 'component-pin-overlay',  file: 'components/pin-overlay.html' },
    { id: 'component-modals',       file: 'components/modals.html' }
  ];

  var loaded = 0;
  var total = components.length;

  function onAllLoaded(){
    // All components injected — now load the main script
    var s = document.createElement('script');
    s.src = 'script.js';
    document.body.appendChild(s);
  }

  components.forEach(function(comp){
    fetch(comp.file)
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.getElementById(comp.id).innerHTML = html;
        loaded++;
        if(loaded >= total) onAllLoaded();
      })
      .catch(function(err){
        console.error('[LOADER] Failed to load ' + comp.file + ':', err);
        loaded++;
        if(loaded >= total) onAllLoaded();
      });
  });
})();
</script>
</body>
</html>
