<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=5.0"/>
<title>ExamEngine Pro v12.5 — Teacher &amp; Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink:#0A0F1E; --ink2:#1E2A3A; --ink3:#334155; --mute:#6B7A99;
  --surf:#FFFFFF; --surf2:#F4F6FA; --surf3:#EBEEf7;
  --bdr:#DDE3EE; --bdr2:#C4CDDE;
  --blue:#1B54F0; --blue-dk:#1444CC; --blue-lt:#EBF0FF; --blue-md:#B8CAFF;
  --green:#0B8F6B; --green-lt:#E8FBF4; --green-bdr:#5ED4B0;
  --amber:#C47B09; --amber-lt:#FEF8E8; --amber-bdr:#F4C145;
  --red:#D63535; --red-lt:#FEF2F2; --red-bdr:#FCA5A5;
  --purple:#6D28D9; --purple-lt:#F5F3FF; --purple-bdr:#C4B5FD;
  --sh1:0 1px 3px rgba(10,15,30,.06),0 4px 16px rgba(10,15,30,.04);
  --sh2:0 4px 24px rgba(10,15,30,.09),0 12px 48px rgba(10,15,30,.07);
  --sh-blue:0 4px 20px rgba(27,84,240,.28);
  --sh-green:0 4px 16px rgba(11,143,107,.22);
  --r:14px; --rs:9px; --rm:11px;
  --mono:'Fira Code',monospace; --sans:'Plus Jakarta Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--surf2);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:hidden;}

/* ── DESKTOP LAYOUT FIX ─────────────────── */
@media(min-width:1024px){
  .pg{max-width:880px;}
  .pgw{max-width:1100px;}
  #sidebar{position:fixed;left:0;transform:none;z-index:800;}
  .main-content{margin-left:0;}
}

/* ── TABLE RESPONSIVE ─────────────────── */
.sb-board-table{width:100%;border-collapse:collapse;overflow-x:auto;}
.sb-board-table thead{background:var(--surf3);border-bottom:2px solid var(--bdr);}
.sb-board-table th{font-weight:700;color:var(--ink3);text-align:left;padding:8px 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;}
.sb-board-table td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
.sb-board-table tbody tr:hover{background:var(--surf3);}

/* ── OVERFLOW HANDLING ────────────────── */
.pq-class-body{overflow-x:auto;}
.sb-board-table{display:block;width:100%;border-radius:8px;overflow:hidden;box-shadow:var(--sh1);}
.sb-board-table thead{display:table;width:100%;table-layout:fixed;}
.sb-board-table tbody{display:block;max-height:400px;overflow-y:auto;}
.sb-board-table tbody tr{display:table;width:100%;table-layout:fixed;}

/* ── BUTTON RESPONSIVE ──────────────────── */
@media(max-width:768px){
  .sb-act-btns{justify-content:flex-start;}
  .sb-approve-btn,.sb-reject-btn,.sb-lab-btn{min-width:fit-content;}
}

/* ── SIDEBAR ─────────────────────────── */
#sidebar{
  position:fixed;top:0;left:-290px;width:272px;height:100vh;
  background:var(--surf);border-right:1.5px solid var(--bdr);
  box-shadow:8px 0 40px rgba(10,15,30,.13);
  z-index:800;transition:left .32s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar.open{left:0;}
#sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(10,15,30,.38);z-index:799;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
#sb-overlay.open{display:block;}
.sb-brand{
  display:flex;align-items:center;gap:10px;padding:20px 18px 16px;
  border-bottom:1.5px solid var(--bdr);flex-shrink:0;
}
.sb-brand-mark{
  width:34px;height:34px;border-radius:9px;background:var(--blue);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;box-shadow:var(--sh-blue);flex-shrink:0;
}
.sb-brand-name{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.4px;}
.sb-brand-ver{font-size:10px;color:var(--mute);font-weight:600;margin-top:1px;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 10px;}
.sb-link{
  display:flex;align-items:center;gap:11px;padding:11px 13px;
  border-radius:10px;cursor:pointer;transition:all .18s;
  font-size:13px;font-weight:600;color:var(--ink3);margin-bottom:3px;
  border:none;background:transparent;width:100%;text-align:left;
  font-family:var(--sans);
}
.sb-link:hover{background:var(--surf2);color:var(--blue);}
.sb-link.active{background:var(--blue-lt);color:var(--blue);font-weight:700;}
.sb-link .sb-ico{font-size:17px;flex-shrink:0;width:22px;text-align:center;}
.sb-divider{height:1px;background:var(--bdr);margin:8px 0;}
.sb-foot{
  padding:14px 18px;border-top:1.5px solid var(--bdr);flex-shrink:0;
  font-size:11px;color:var(--mute);line-height:1.6;
}
.sb-api-status{
  display:flex;align-items:center;gap:7px;margin-bottom:6px;
  font-size:11.5px;font-weight:700;
}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.sb-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}

/* ── NAV ──────────────────────────────── */
#nav{
  background:rgba(255,255,255,.97);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:400;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 var(--bdr),0 2px 10px rgba(10,15,30,.04);
}
.nav-in{max-width:1140px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:0;}
.nav-hamburger{
  width:36px;height:36px;border:1.5px solid var(--bdr);background:var(--surf2);
  border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;color:var(--ink3);transition:all .2s;
  margin-right:14px;flex-shrink:0;
}
.nav-hamburger:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.5px;margin-right:28px;flex-shrink:0;text-decoration:none;}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;box-shadow:var(--sh-blue);}
.steps{display:flex;align-items:center;flex:1;}
.si{display:flex;align-items:center;gap:7px;}
.sb2{width:24px;height:24px;border-radius:50%;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:var(--mute);transition:all .3s;flex-shrink:0;font-family:var(--mono);}
.si.on .sb2{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 0 0 3px var(--blue-lt);}
.si.dn .sb2{border-color:var(--green);background:var(--green);color:#fff;}
.sn{font-size:11px;font-weight:600;color:var(--mute);white-space:nowrap;transition:color .3s;}
.si.on .sn{color:var(--blue);font-weight:700;}
.si.dn .sn{color:var(--green);}
.sl{height:2px;background:var(--bdr);flex:1;max-width:48px;min-width:10px;margin:0 8px;border-radius:2px;transition:background .4s;}
.sl.dn{background:var(--green);}
.nav-r{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0;}
.api-chip{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;padding:5px 11px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--surf2);cursor:pointer;transition:all .2s;font-family:var(--mono);}
.api-chip:hover{border-color:var(--blue);background:var(--blue-lt);}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;}
.api-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.icon-btn{width:34px;height:34px;border-radius:var(--rs);border:1.5px solid var(--bdr);background:var(--surf2);color:var(--mute);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}

/* ── TOAST ────────────────────────────── */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink2);color:#fff;padding:10px 20px;border-radius:30px;font-size:12.5px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:9999;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s;opacity:0;white-space:nowrap;display:flex;align-items:center;gap:8px;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.warn{background:var(--amber);}
#toast.err{background:var(--red);}
#toast.ok{background:var(--green);}

/* ── LAYOUT ───────────────────────────── */
.pg{max-width:820px;margin:0 auto;padding:44px 22px 90px;}
.pgw{max-width:1020px;margin:0 auto;padding:44px 22px 90px;}
.ptl{font-size:26px;font-weight:800;letter-spacing:-.7px;margin-bottom:6px;}
.pst{font-size:13px;color:var(--mute);margin-bottom:32px;line-height:1.6;}

/* ── DASHBOARD ────────────────────────── */
#screen-dash{display:none;}
.dash-hero{background:linear-gradient(135deg,var(--blue) 0%,#3B6EF8 60%,#1444CC 100%);border-radius:18px;padding:32px 28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden;}
.dash-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);}
.dash-hero::after{content:'';position:absolute;bottom:-60px;right:60px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);}
.dash-greeting{font-size:13px;font-weight:600;opacity:.8;margin-bottom:6px;}
.dash-title{font-size:24px;font-weight:800;letter-spacing:-.6px;margin-bottom:18px;line-height:1.2;}
.dash-new-btn{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--blue);padding:12px 24px;border-radius:10px;font-size:13.5px;font-weight:800;cursor:pointer;border:none;font-family:var(--sans);transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.18);}
.dash-new-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.22);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh1);}
.stat-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.stat-lbl{font-size:11.5px;color:var(--mute);font-weight:600;}
.stat-sub{font-size:10.5px;color:var(--green);font-weight:700;margin-top:3px;}
.recent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.recent-title{font-size:13px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;}
.recent-all{font-size:12px;color:var(--blue);cursor:pointer;font-weight:700;}
.recent-card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;}
.recent-card:hover{border-color:var(--blue);box-shadow:var(--sh1);}
.recent-ico{width:38px;height:38px;border-radius:9px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.recent-body{flex:1;min-width:0;}
.recent-subj{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-meta{font-size:11px;color:var(--mute);margin-top:2px;}
.recent-ref{font-family:var(--mono);font-size:10px;color:var(--blue);margin-top:3px;font-weight:700;}
.status-pill{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.sp-pub{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bdr);}
.sp-draft{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-bdr);}
.dash-empty{text-align:center;padding:48px 20px;color:var(--mute);font-size:13px;line-height:1.7;}
.dash-empty-ico{font-size:40px;margin-bottom:12px;}

/* ── GATE ─────────────────────────────── */
#screen-gate{display:none;min-height:calc(100vh - 60px);align-items:center;justify-content:center;padding:40px 22px;flex-direction:column;}
.gate-headline{font-size:26px;font-weight:800;letter-spacing:-.7px;color:var(--ink);text-align:center;margin-bottom:8px;line-height:1.2;}
.gate-sub{font-size:13.5px;color:var(--mute);text-align:center;margin-bottom:36px;max-width:460px;line-height:1.65;}
.gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:660px;}
.gate-card{background:var(--surf);border:2px solid var(--bdr);border-radius:18px;padding:30px 26px;cursor:pointer;transition:all .28s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;text-align:left;}
.gate-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 55%,rgba(27,84,240,.04));pointer-events:none;}
.gate-card:hover{border-color:var(--blue);box-shadow:var(--sh2),0 0 0 4px var(--blue-lt);transform:translateY(-4px);}
.gate-card:active{transform:translateY(-1px);}
.gate-icon{font-size:36px;margin-bottom:14px;display:block;line-height:1;}
.gate-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:7px;letter-spacing:-.3px;}
.gate-desc{font-size:12.5px;color:var(--mute);line-height:1.7;margin-bottom:18px;}
.gate-cta{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--blue);}
.gate-badge{position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;background:var(--green-lt);color:var(--green);border:1px solid var(--green-bdr);}

/* ── CARDS & FORMS ────────────────────── */
.card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:22px;margin-bottom:16px;box-shadow:var(--sh1);transition:box-shadow .2s;}
.card:hover{box-shadow:var(--sh2);}
.ct{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--mute);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ct::before{content:'';width:14px;height:2.5px;background:var(--blue);border-radius:2px;flex-shrink:0;}
.fl{margin-bottom:14px;}
.fl label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mute);margin-bottom:6px;}
.fi,.fs,.fta{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);color:var(--ink);padding:10px 13px;border-radius:var(--rs);font-family:var(--sans);font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,84,240,.1);background:#fff;}
.fta{min-height:78px;resize:vertical;line-height:1.7;}
.num-input{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);color:var(--ink);padding:10px 13px;border-radius:var(--rs);font-family:var(--mono);font-size:22px;font-weight:700;outline:none;transition:border-color .2s,box-shadow .2s;text-align:center;}
.num-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,84,240,.1);background:#fff;}
.num-input.fitb-input{border-color:var(--purple-bdr);color:var(--purple);}
.num-input.fitb-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,.1);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* ── TOGGLE ───────────────────────────── */
.atog{display:inline-flex;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:4px;gap:3px;}
.ab{padding:8px 18px;border-radius:7px;border:none;font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--mute);background:transparent;}
.ab.on{background:var(--surf);color:var(--blue);box-shadow:var(--sh1);border:1.5px solid var(--bdr);}

/* ── BUTTONS ──────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:var(--rs);font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .22s;white-space:nowrap;letter-spacing:-.1px;}
.bp{background:var(--blue);color:#fff;box-shadow:var(--sh-blue);}
.bp:hover{background:var(--blue-dk);transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,84,240,.36);}
.bp:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}
.bg{background:var(--green);color:#fff;box-shadow:var(--sh-green);}
.bg:hover{opacity:.88;transform:translateY(-1px);}
.bg:disabled{opacity:.32;cursor:not-allowed;transform:none;}
.bq{background:transparent;color:var(--mute);border:1.5px solid var(--bdr);}
.bq:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.bsm{padding:7px 14px;font-size:12px;}
.bred{background:var(--red);color:#fff;}
.bred:hover{opacity:.88;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:none;cursor:pointer;font-family:var(--sans);font-size:12px;color:var(--mute);padding:5px 9px;border-radius:6px;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.btn-ghost:hover{background:var(--surf3);color:var(--ink);}

/* ── FLOW STEPS ───────────────────────── */
.flow-step{opacity:.35;pointer-events:none;transition:opacity .35s,filter .35s;filter:grayscale(40%);}
.flow-step.unlocked{opacity:1;pointer-events:all;filter:none;}

/* ── SUBJECT PILLS ────────────────────── */
.subj-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.spill{padding:7px 15px;border-radius:20px;border:1.5px solid var(--bdr);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink3);background:var(--surf2);transition:all .2s;}
.spill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.spill.sel{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(27,84,240,.25);}
.spill.trade-pill{border-color:var(--green-bdr);color:var(--green);background:var(--green-lt);}
.spill.trade-pill.sel{background:var(--green);border-color:var(--green);color:#fff;}

/* ── TRADE PANEL ──────────────────────── */
.trade-panel{background:var(--green-lt);border:1.5px solid var(--green-bdr);border-radius:var(--rs);padding:14px 16px;margin-top:10px;}
.trade-panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:10px;}
.trade-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--green-bdr);background:var(--surf);cursor:pointer;transition:all .2s;margin-bottom:6px;}
.trade-opt:last-child{margin-bottom:0;}
.trade-opt.sel{border-color:var(--green);background:var(--green);color:#fff;}
.trade-opt .to-ico{font-size:18px;}
.trade-opt .to-name{font-size:13px;font-weight:700;}
.trade-opt .to-desc{font-size:11px;color:var(--mute);margin-top:1px;}
.trade-opt.sel .to-desc{color:rgba(255,255,255,.75);}

/* ── SCHEME ───────────────────────────── */
.scheme-panel{background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--rm);overflow:hidden;margin-top:12px;}
.scheme-head{padding:11px 15px;background:var(--blue-lt);border-bottom:1px solid var(--blue-md);display:flex;align-items:center;justify-content:space-between;}
.scheme-head-txt{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;}
.scheme-body{padding:11px 15px;max-height:220px;overflow-y:auto;}
.scheme-wk{display:flex;gap:10px;margin-bottom:9px;font-size:12.5px;color:var(--ink3);line-height:1.55;}
.scheme-wk-num{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--blue);min-width:52px;padding-top:1px;flex-shrink:0;}
.scheme-sub{font-size:11px;color:var(--mute);margin-top:1px;}
.scheme-foot{display:flex;gap:8px;padding:11px 15px;border-top:1px solid var(--bdr);}

/* ── TAG CLOUD ────────────────────────── */
.tag-cloud{display:flex;flex-wrap:wrap;gap:7px;padding:12px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--rs);min-height:48px;}
.ttag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 12px;background:var(--blue-lt);border:1.5px solid var(--blue-md);border-radius:20px;font-size:11.5px;font-weight:600;color:var(--blue);}
.ttag-x{width:16px;height:16px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0;line-height:1;}
.ttag-x:hover{background:var(--red);transform:scale(1.12);}
.tag-empty{font-size:12px;color:var(--mute);font-style:italic;}

/* ── BANNERS ──────────────────────────── */
.banner{display:flex;align-items:flex-start;gap:10px;padding:12px 15px;border-radius:var(--rm);font-size:12.5px;font-weight:500;margin-bottom:14px;line-height:1.6;}
.banner b{font-weight:700;}
.banner a{font-weight:700;cursor:pointer;text-decoration:underline;}
.b-warn{background:var(--red-lt);border:1.5px solid var(--red-bdr);color:var(--red);}
.b-info{background:var(--blue-lt);border:1.5px solid var(--blue-md);color:var(--blue);}
.b-ok{background:var(--green-lt);border:1.5px solid var(--green-bdr);color:var(--green);}
.b-amber{background:var(--amber-lt);border:1.5px solid var(--amber-bdr);color:var(--amber);}

/* ── TAGS ─────────────────────────────── */
.tag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;border:1px solid transparent;display:inline-block;}
.t-obj{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-md);}
.t-fitb{background:var(--purple-lt);color:var(--purple);border-color:var(--purple-bdr);}
.t-th{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bdr);}
.t-ai{background:#E0F2FE;color:#0369A1;border-color:#7DD3FC;}
.t-tr{background:#EDE9FE;color:#5B21B6;border-color:#C4B5FD;}
.t-waec{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-md);}
.t-jamb{background:#F5F3FF;color:#6D28D9;border-color:#C4B5FD;}
.t-neco{background:#FFF7ED;color:#C2410C;border-color:#FDBA74;}
.t-bece{background:var(--green-lt);color:var(--green);border-color:var(--green-bdr);}
.t-ce{background:#FDF4FF;color:#9333EA;border-color:#E879F9;}
.t-cust{background:var(--surf3);color:var(--ink3);border-color:var(--bdr2);}
.t-marks{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bdr);}

/* ── PROGRESS METER ───────────────────── */
.meter{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:18px 22px;margin-bottom:20px;box-shadow:var(--sh1);}
.m-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.m-lbl{font-size:13px;font-weight:700;color:var(--ink3);}
.m-cnt{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue);}
.m-trk{background:var(--surf2);border-radius:4px;height:7px;overflow:hidden;border:1px solid var(--bdr);}
.m-fil{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#34D399);transition:width .5s cubic-bezier(.22,1,.36,1);}
.m-msg{font-size:11.5px;margin-top:7px;font-weight:600;color:var(--mute);}

/* ── SLOTS ────────────────────────────── */
.slot{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh1);transition:all .3s;position:relative;overflow:hidden;}
.slot.ok{border-color:var(--green-bdr);background:linear-gradient(135deg,#fff 80%,#f0fdf8);}
.slot.ok::before{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 20px 20px 0;border-color:transparent var(--green) transparent transparent;}
.slot.fitb-slot{border-color:var(--purple-bdr);}
.slot.fitb-slot.ok{border-color:var(--purple);background:linear-gradient(135deg,#fff 80%,#f5f3ff);}
.slot.fitb-slot.ok::before{border-color:transparent var(--purple) transparent transparent;}
.slot.loading{opacity:.58;pointer-events:none;}
.slot.err{border-color:var(--red-bdr);background:var(--red-lt);}
.sh2{display:flex;align-items:flex-start;gap:13px;}
.snum{min-width:30px;height:30px;border-radius:7px;background:var(--surf2);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--mute);flex-shrink:0;}
.slot.ok .snum{background:var(--green-lt);border-color:var(--green-bdr);color:var(--green);}
.slot.fitb-slot.ok .snum{background:var(--purple-lt);border-color:var(--purple-bdr);color:var(--purple);}
.sbody{flex:1;min-width:0;}
.stx{font-size:13.5px;color:var(--ink3);line-height:1.85;}
.stx img{max-width:100%;border-radius:6px;margin:6px 0;border:1px solid var(--bdr);display:block;}
.diagram-box{background:var(--surf2);border:1.5px dashed var(--bdr2);border-radius:var(--rs);padding:10px;margin:8px 0;display:flex;align-items:center;gap:10px;}
.diagram-box img{max-width:240px;max-height:160px;border-radius:6px;border:1px solid var(--bdr);object-fit:contain;cursor:pointer;}
.diagram-box img:hover{border-color:var(--blue);}
.diagram-label{font-size:11px;color:var(--mute);font-weight:600;font-style:italic;}
.fitb-answer{margin-top:8px;padding:8px 12px;background:var(--purple-lt);border:1.5px solid var(--purple-bdr);border-radius:7px;font-size:12px;color:var(--purple);font-weight:600;}
.fitb-answer span{font-weight:400;color:var(--mute);}
.sopts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px;}
.sopt{display:flex;gap:7px;align-items:flex-start;padding:7px 10px;border:1.5px solid var(--bdr);border-radius:7px;background:var(--surf2);font-size:12px;color:var(--mute);}
.sopt.correct{border-color:var(--green-bdr);background:var(--green-lt);color:var(--green);}
.sok{font-family:var(--mono);font-weight:700;color:var(--blue);flex-shrink:0;}
.sopt.correct .sok{color:var(--green);}
.smeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.sacts{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;}
.rbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;background:transparent;border:1.5px solid var(--bdr);border-radius:6px;color:var(--mute);font-size:11px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:all .2s;}
.rbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.rbtn:disabled{opacity:.3;cursor:not-allowed;}
.crow{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
.ck{width:20px;height:20px;border-radius:5px;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.ck.on{background:var(--green);border-color:var(--green);}
.cl{font-size:12px;color:var(--mute);font-weight:500;}
.ck.on~.cl{color:var(--green);font-weight:700;}

/* ── MARK ALLOC ───────────────────────── */
.mark-alloc{display:flex;align-items:center;gap:7px;margin-top:10px;padding:8px 12px;background:var(--amber-lt);border:1.5px solid var(--amber-bdr);border-radius:var(--rs);}
.mark-alloc label{font-size:11px;font-weight:700;color:var(--amber);white-space:nowrap;}
.mark-alloc input{width:58px;padding:4px 8px;border-radius:5px;border:1.5px solid var(--amber-bdr);background:var(--surf);font-family:var(--mono);font-size:14px;font-weight:700;color:var(--amber);text-align:center;outline:none;}
.mark-alloc input:focus{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-lt);}
.mark-alloc span{font-size:11px;color:var(--amber);}

/* ── WORKSHOP SECTIONS ────────────────── */
.ws-sec{margin-bottom:26px;}
.ws-sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;padding-bottom:9px;border-bottom:2px solid var(--bdr);}
.ws-sec-title{font-size:12.5px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;}
.ws-sec-count{font-family:var(--mono);font-size:11px;color:var(--mute);font-weight:600;}
.ws-sec-title.fitb-title{color:var(--purple);}

/* ── SCREEN 3 / REVIEW ────────────────── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px;}
.sbox{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:16px;box-shadow:var(--sh1);text-align:center;}
.sv{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--blue);}
.slb{font-size:11px;color:var(--mute);margin-top:4px;font-weight:600;}
.qp{display:flex;gap:13px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:13px;margin-bottom:10px;font-size:13px;line-height:1.8;color:var(--ink3);transition:border-color .2s;}
.qp:hover{border-color:var(--blue-md);}
.qp.fitb-qp{border-color:var(--purple-bdr);background:var(--purple-lt);}
.qn{font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:700;min-width:28px;flex-shrink:0;padding-top:2px;}
.qp.fitb-qp .qn{color:var(--purple);}
.divider{border:none;border-top:1.5px solid var(--bdr);margin:24px 0;}
.suw{text-align:center;padding:68px 22px;}
.sui{font-size:68px;margin-bottom:18px;}
.sut{font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:10px;}
.sum{font-size:14px;color:var(--mute);max-width:450px;margin:0 auto 24px;line-height:1.75;}
.ref-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--rs);font-family:var(--mono);font-size:12px;color:var(--ink3);margin-bottom:24px;}

/* ── MODAL ────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(10,15,30,.5);z-index:900;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.modal{background:var(--surf);border-radius:18px;padding:32px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(10,15,30,.22);animation:mIn .25s ease;border:1.5px solid var(--bdr);}
@keyframes mIn{from{opacity:0;transform:translateY(-14px) scale(.97)}to{opacity:1;transform:none}}
.modal-title{font-size:19px;font-weight:800;letter-spacing:-.5px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--mute);margin-bottom:22px;line-height:1.65;}
.key-row{display:flex;gap:9px;align-items:center;}
.key-row .fi{font-family:var(--mono);font-size:12.5px;flex:1;}
.key-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap;}
.api-note{margin-top:13px;padding:11px 14px;background:var(--blue-lt);border:1.5px solid var(--blue-md);border-radius:var(--rs);font-size:12px;color:var(--blue);line-height:1.65;}

/* ── ARCHIVE / LOAD ───────────────────── */
.arch-search{display:flex;gap:9px;margin-bottom:18px;}
.arch-search .fi{flex:1;}
.arch-card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:15px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all .2s;}
.arch-card:hover{border-color:var(--blue);box-shadow:var(--sh1);}
.arch-ico{width:40px;height:40px;border-radius:9px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.arch-body{flex:1;min-width:0;}
.arch-title{font-size:13px;font-weight:700;color:var(--ink);}
.arch-meta{font-size:11px;color:var(--mute);margin-top:2px;}
.arch-ref{font-family:var(--mono);font-size:10px;color:var(--blue);font-weight:700;margin-top:3px;}
.arch-acts{display:flex;gap:6px;flex-shrink:0;}

/* ── SKELETON ─────────────────────────── */
.skel{background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:6px;height:13px;margin-bottom:9px;}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel.short{width:38%;}
.skel.med{width:64%;}

/* ── MISC ─────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .9s linear infinite;}
.fade{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
.fetch-note{font-size:11px;color:var(--mute);margin-top:5px;display:flex;align-items:center;gap:5px;font-weight:600;}
.diff-toggle{display:inline-flex;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:4px;gap:3px;margin-top:8px;}
.diff-btn{padding:7px 14px;border-radius:7px;border:none;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--mute);background:transparent;}
.diff-btn.on{background:var(--surf);color:var(--ink);box-shadow:var(--sh1);border:1.5px solid var(--bdr);}
.diff-btn.on.lenient{color:var(--green);border-color:var(--green-bdr);}
.diff-btn.on.balanced{color:var(--blue);border-color:var(--blue-md);}
.diff-btn.on.rigorous{color:var(--red);border-color:var(--red-bdr);}

/* ══════════════════════════════════════
   PHASE 2 — ADMIN WATCHTOWER CSS
══════════════════════════════════════ */
:root {
  --admin:#7C3AED; --admin-lt:#F5F3FF; --admin-bdr:#C4B5FD; --admin-dk:#6D28D9;
  --gold:#B45309; --gold-lt:#FFFBEB; --gold-bdr:#FCD34D;
  --sh-admin:0 4px 20px rgba(124,58,237,.28);
}

/* ── ROLE BADGE ────────────────────────── */
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;border:1.5px solid transparent;}
.role-badge.teacher{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-md);}
.role-badge.admin{background:var(--admin-lt);color:var(--admin);border-color:var(--admin-bdr);}

/* ── ROLE SWITCHER ─────────────────────── */
.role-switcher{padding:12px 14px;border-top:1.5px solid var(--bdr);}
.role-sw-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mute);margin-bottom:8px;}
.role-sw-btns{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.role-sw-btn{padding:8px 6px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--surf2);cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--mute);transition:all .2s;text-align:center;line-height:1.3;}
.role-sw-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.role-sw-btn.active{background:var(--blue);color:#fff;border-color:var(--blue-dk);box-shadow:0 2px 8px rgba(27,84,240,.3);}
.role-sw-btn.admin.active{background:var(--admin);border-color:var(--admin-dk);box-shadow:var(--sh-admin);}

/* ── ADMIN HERO ────────────────────────── */
.admin-hero{background:linear-gradient(135deg,var(--admin) 0%,#9333EA 60%,var(--admin-dk) 100%);border-radius:18px;padding:28px 28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden;}
.admin-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07);}
.admin-hero::after{content:'';position:absolute;bottom:-50px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);}
.admin-hero-tag{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-bottom:6px;}
.admin-hero-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px;line-height:1.2;}
.admin-hero-stats{display:flex;gap:20px;font-size:12px;opacity:.85;}
.admin-hero-stat strong{font-size:20px;font-weight:900;display:block;margin-bottom:1px;}

/* ── STATUS BOARD ──────────────────────── */
.status-board{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:20px;box-shadow:var(--sh1);}
.sb-board-head{padding:14px 18px;background:var(--admin-lt);border-bottom:1.5px solid var(--admin-bdr);display:flex;align-items:center;justify-content:space-between;}
.sb-board-title{font-size:12px;font-weight:800;color:var(--admin);text-transform:uppercase;letter-spacing:.8px;}
.sb-board-filter{display:flex;gap:6px;}
.sb-filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--admin-bdr);background:transparent;color:var(--admin);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.sb-filter-btn.on{background:var(--admin);color:#fff;}
.sb-board-table{width:100%;border-collapse:collapse;}
.sb-board-table th{padding:9px 16px;background:var(--surf2);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mute);text-align:left;border-bottom:1px solid var(--bdr);}
.sb-board-table td{padding:10px 16px;border-bottom:1px solid var(--bdr);font-size:12.5px;color:var(--ink3);vertical-align:middle;}
.sb-board-table tr:last-child td{border-bottom:none;}
.sb-board-table tr:hover td{background:var(--surf2);}
.sb-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.sb-pending{background:var(--surf3);color:var(--mute);border:1px solid var(--bdr2);}
.sb-submitted{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-bdr);}
.sb-approved{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bdr);}
.sb-approved-badge{background:var(--green-lt);color:var(--green);border:1.5px solid var(--green-bdr);padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:default;transition:all .2s;}
.sb-rejected-badge{background:var(--red-lt);color:var(--red);border:1.5px solid var(--red-bdr);padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:default;transition:all .2s;}
.sb-lab-btn{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px;}
.sb-lab-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(109,40,217,.25);}
.sb-act-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.sb-rejected{background:var(--red-lt);color:var(--red);border:1px solid var(--red-bdr);}
.sb-autogen{background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple-bdr);}
.sb-act-btns{display:flex;gap:5px;align-items:center;}
.sb-approve-btn{padding:4px 12px;border-radius:6px;border:1.5px solid var(--green-bdr);background:var(--green-lt);color:var(--green);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.sb-approve-btn:hover{background:var(--green);color:#fff;}
.sb-reject-btn{padding:4px 12px;border-radius:6px;border:1.5px solid var(--red-bdr);background:var(--red-lt);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.sb-reject-btn:hover{background:var(--red);color:#fff;}
.sb-autogen-btn{padding:4px 12px;border-radius:6px;border:1.5px solid var(--purple-bdr);background:var(--purple-lt);color:var(--purple);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.sb-autogen-btn:hover{background:var(--purple);color:#fff;}

/* ── CORRECTION NOTE ───────────────────── */
.correction-banner{background:var(--red-lt);border:2px solid var(--red-bdr);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;animation:fadeIn .4s ease;}
.correction-title{font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.correction-item{background:#fff;border:1.5px solid var(--red-bdr);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;font-size:12.5px;color:var(--ink3);line-height:1.65;}
.correction-item:last-child{margin-bottom:0;}
.correction-ref{font-family:var(--mono);font-size:10px;color:var(--red);font-weight:700;margin-bottom:5px;}
.correction-note{font-style:italic;color:var(--red);font-size:12px;margin-top:4px;}

/* ── ECONOMY PRINT LAB ─────────────────── */
.print-lab{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh1);}
.print-lab-head{padding:14px 18px;background:linear-gradient(135deg,var(--ink2),var(--ink3));display:flex;align-items:center;justify-content:space-between;}
.print-lab-title{font-size:13px;font-weight:800;color:#fff;letter-spacing:-.2px;}
.print-lab-meta{font-size:10.5px;color:rgba(255,255,255,.6);}
.economy-toggle{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--surf2);border-bottom:1px solid var(--bdr);}
.economy-toggle-label{font-size:12px;font-weight:700;color:var(--ink3);flex:1;}
.economy-toggle-sub{font-size:11px;color:var(--mute);margin-top:1px;}
.eco-switch{width:48px;height:26px;background:var(--bdr2);border-radius:13px;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;border:none;}
.eco-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.eco-switch.on{background:var(--green);}
.eco-switch.on::after{transform:translateX(22px);}
.q-layout-row{display:flex;align-items:flex-start;gap:14px;padding:11px 18px;border-bottom:1px solid var(--bdr);}
.q-layout-num{font-family:var(--mono);font-size:10px;color:var(--mute);min-width:28px;padding-top:3px;font-weight:700;}
.q-layout-text{flex:1;font-size:12.5px;color:var(--ink3);line-height:1.65;word-break:break-word;}
.q-layout-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0;padding-top:2px;}
.layout-btn{padding:5px 10px;border-radius:6px;border:1.5px solid var(--bdr);background:var(--surf2);color:var(--mute);font-size:10.5px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.layout-btn.on{background:var(--blue-lt);border-color:var(--blue-md);color:var(--blue);}
.layout-btn:hover:not(.on){border-color:var(--blue-md);color:var(--blue);}

/* ── BRANDING PANEL ────────────────────── */
.brand-preview{border:2px dashed var(--bdr2);border-radius:var(--rs);padding:20px;text-align:center;position:relative;overflow:hidden;min-height:90px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}

.upload-zone:hover{border-color:var(--blue);background:var(--blue-lt);}

/* ── REJECT MODAL ──────────────────────── */

/* ── DEADLINE DISPLAY ──────────────────── */

/* ── PRODUCTION QUEUE ACCORDION ────────── */
.pq-class-group{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh1);}

.scheme-change-btn:hover{background:var(--amber);color:#fff;}

/* ══════════════════════════════════════
   SINGLE DEFINITIVE @media print BLOCK
   Phase 1 Normal   → #pp visible (portrait)       [body.normal-mode]
   Phase 1 Economy  → #eco-print-frame visible      [body.economy-mode]
   Digital Lab      → #print-root visible            [body.lab-print-mode]
══════════════════════════════════════ */
@media print {
  /* Hide every direct body child */
  body > * { display: none !important; }

  /* Phase 1 — show correct frame per mode */
  body.normal-mode  > #pp               { display: block !important; }
  body.economy-mode > #eco-print-frame  { display: block !important; }

  /* Digital Lab — show print-root, reset screen-only styles */
  body.lab-print-mode > #print-root {
    display: block !important;
    position: static !important;
    inset: auto !important;
    overflow: visible !important;
    padding: 0 !important;
    z-index: auto !important;
    background: #fff !important;
    width: 100% !important;
    height: auto !important;
  }

  /* Economy layout inside print-root */
  body.lab-print-mode #print-root .eco-page-pair {
    display: grid !important;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    page-break-after: always;
    position: relative;
  }
  body.lab-print-mode #print-root .eco-page-pair:last-child { page-break-after: auto; }
  body.lab-print-mode #print-root .eco-col {
    padding: 6mm 7mm;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
    font-size: 8.5pt;
    line-height: 1.35;
  }
  body.lab-print-mode #print-root .eco-col-left { border-right: 0.4mm dashed #aaa; }

  /* Defaults when no mode is active */
  #pp               { display: none; }
  #eco-print-frame  { display: none; }
  #print-root       { display: none; }

  /* ── NORMAL PAPER STYLES ── */
  .ep {
    font-family: "Times New Roman", serif;
    font-size: 11pt;
    line-height: 1.7;
    color: #000;
    padding: 18mm 20mm 14mm;
    background: #fff;
    max-width: 210mm;
    margin: 0 auto;
    box-sizing: border-box;
  }
  .ep-header {
    text-align: center;
    border-bottom: 3pt double #000;
    padding-bottom: 7pt;
    margin-bottom: 9pt;
  }
  .ep-crest {
    width: 48pt; height: 48pt;
    border: 2pt solid #000; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14pt; margin: 0 auto 5pt;
  }
  .ep-school    { font-size: 14pt; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2pt; }
  .ep-title     { font-size: 12pt; font-weight: 700; text-transform: uppercase; margin-bottom: 2pt; }
  .ep-meta      { font-size: 10pt; margin-bottom: 2pt; }
  .ep-meta span { margin: 0 8pt; }
  .ep-instr     { font-size: 9pt; font-style: italic; border: 1pt solid #666; padding: 4pt 8pt; margin: 6pt 0; }
  .ep-sec       { font-size: 11pt; font-weight: 700; text-transform: uppercase; border-bottom: 1.5pt solid #000; padding-bottom: 2pt; margin: 12pt 0 3pt; }
  .ep-sec-note  { font-size: 9pt; font-style: italic; color: #333; border-left: 2pt solid #999; padding-left: 6pt; margin-bottom: 5pt; }
  .ep-footer    { font-size: 8pt; color: #555; text-align: center; border-top: 1pt solid #ccc; padding-top: 3pt; margin-top: 14pt; }
  .ep-wm        { position: fixed; bottom: 40mm; left: 50%; transform: translateX(-50%) rotate(-35deg); font-size: 60pt; color: rgba(0,0,0,.04); font-weight: 900; white-space: nowrap; pointer-events: none; }

  /* ── OBJECTIVES — Inline, never stacked ── */
  .objective-container { display: block; }
  .objective-2col      { column-count: 2; column-gap: 10px; }
  .objective-item      { break-inside: avoid; page-break-inside: avoid; margin-bottom: 4px; font-size: 8.5pt; line-height: 1.2; display: block; }
  .opt-inline          { display: inline; margin-left: 6pt; white-space: nowrap; }
  .opt-inline-k        { font-weight: 700; }

  /* ── FILL-IN-BLANK & THEORY ── */
  .ep-q            { margin-bottom: 8pt; page-break-inside: avoid; break-inside: avoid; }
  .ep-q.compact    { margin-bottom: 3pt; line-height: 1.4; }
  .ep-q.wide       { margin-bottom: 14pt; line-height: 2.0; }
  .ep-qn           { font-weight: 700; }
  .ep-fitb-blank   { display: inline-block; border-bottom: 1.5pt solid #000; min-width: 70pt; margin: 0 2pt; }
  .ep-ans          { border-bottom: 1pt solid #bbb; min-height: 48pt; margin: 3pt 0 9pt; }
  .ep-ans.compact  { min-height: 24pt !important; }
  .ep-ans.wide     { min-height: 70pt !important; }

  /* ── MARKING GUIDE ── */

/* ══════════════════════════════════════
   SUPABASE INIT

var _supabase;
(function(){
  var SUPA_URL='https://qbjtiximcchhnxhttogq.supabase.co';

  // jsdelivr @supabase/supabase-js@2 UMD exposes window.supabase = { createClient }

}());

/* ── AUTH STATE ───────────────────── */
var CURRENT_USER = null;   // { id, email, name, role }
var _authMode = 'login';

/* ── TAB SWITCHER ─────────────────── */
window.authTab = function(mode){
  _authMode = mode;
  clearAuthErr();
  var lp=$('authLoginPanel'), rp=$('authRegisterPanel');
  var tl=$('tabLogin'), tr=$('tabRegister');
  if(mode==='login'){
    if(lp) lp.style.display='block';
    if(rp) rp.style.display='none';
    if(tl){ tl.style.background='var(--blue)'; tl.style.color='#fff'; tl.style.fontWeight='700'; }
    if(tr){ tr.style.background='transparent'; tr.style.color='var(--mute)'; tr.style.fontWeight='600'; }
  } else {
    if(lp) lp.style.display='none';
    if(rp) rp.style.display='block';
    if(tr){ tr.style.background='var(--blue)'; tr.style.color='#fff'; tr.style.fontWeight='700'; }
    if(tl){ tl.style.background='transparent'; tl.style.color='var(--mute)'; tl.style.fontWeight='600'; }
  }
};

/* ── SIGN IN ──────────────────────── */
window.doLogin = async function(){
  if(!_supabase){ showAuthErr('Connection not ready. Please refresh the page.'); return; }
  var email = ($('authEmail')||{}).value||'';
  var pass  = ($('authPass')||{}).value||'';
  email = email.trim().toLowerCase();
  if(!email||!pass){ showAuthErr('Please enter your email and password.'); return; }
  setAuthLoading(true);
  try{
    var res = await _supabase.auth.signInWithPassword({ email: email, password: pass });
    if(res.error){ setAuthLoading(false); showAuthErr(res.error.message); return; }
    await _loadUserAndBoot(res.data.user);
  }catch(e){ setAuthLoading(false); showAuthErr('Sign in failed: '+e.message); }
};

/* ── REGISTER ─────────────────────── */
window.doRegister = async function(){
  if(!_supabase){ showAuthErr('Connection not ready. Please refresh the page.'); return; }
  var name  = ($('regName')||{}).value||'';
  var email = ($('regEmail')||{}).value||'';
  var pass  = ($('regPass')||{}).value||'';
  name  = name.trim();
  email = email.trim().toLowerCase();
  pass  = pass.trim();
  if(!name)       { showAuthErr('Please enter your full name.'); return; }
  if(!email)      { showAuthErr('Please enter your email address.'); return; }
  if(pass.length < 6){ showAuthErr('Password must be at least 6 characters.'); return; }
  setAuthLoading(true);
  try{
    var res = await _supabase.auth.signUp({ email: email, password: pass });
    if(res.error){ setAuthLoading(false); showAuthErr(res.error.message); return; }
    var uid = res.data.user && res.data.user.id;
    if(!uid){ setAuthLoading(false); showAuthErr('Registration failed. Please try again.'); return; }
    await _supabase.from('profiles').upsert({ id:uid, email:email, name:name, role:'teacher' });
    var loginRes = await _supabase.auth.signInWithPassword({ email:email, password:pass });
    if(loginRes.error){ setAuthLoading(false); showAuthErr('Account created! Please sign in.'); authTab('login'); return; }
    await _loadUserAndBoot(loginRes.data.user);
  }catch(e){ setAuthLoading(false); showAuthErr('Registration failed: '+e.message); }
};

window.doLogout = async function(){
  if(!confirm('Sign out?')) return;
  await _supabase.auth.signOut();
  CURRENT_USER = null;
  showAuthScreen();
};

function showAuthErr(msg){
  var el=$('authErr'); if(!el) return;
  el.textContent=msg; el.classList.add('show');
}
function clearAuthErr(){ var el=$('authErr'); if(el) el.classList.remove('show'); }
function setAuthLoading(on){
  var btn=$('authBtn'), rb=$('regBtn'), sp=$('authSpinner');
  if(btn){ btn.disabled=on; btn.textContent=on?'Signing in…':'Sign In →'; }
  if(rb){  rb.disabled=on;  rb.textContent=on?'Creating account…':'Create Account →'; }
  if(sp){ sp.classList.toggle('show',on); }
}

/* ── Load profile from DB ─────────── */
async function _loadUserAndBoot(authUser){
  try{
    var res = await _supabase.from('profiles').select('*').eq('id', authUser.id).single();
    var profile = res.data;
    if(!profile){
      var name = (authUser.email||'').split('@')[0];
      var insertRes = await _supabase.from('profiles').insert({
        id: authUser.id, email: authUser.email, name: name, role: 'teacher'
      }).select().single();
      profile = insertRes.data || { id:authUser.id, email:authUser.email, name:name, role:'teacher' };
    }
    CURRENT_USER = { id:profile.id, email:profile.email, name:profile.name||profile.email, role:profile.role||'teacher' };
    hideAuthScreen();
    bootApp();
  } catch(e){
    setAuthLoading(false);
    showAuthErr('Could not load profile: '+e.message+'. Please try again.');
  }
}

/* ── Load user settings from Supabase ── */
async function _loadUserSettings(){
  if(!CURRENT_USER){ return; }
  var res = await _supabase.from('user_settings').select('*').eq('user_id', CURRENT_USER.id);
  var m = {};
  (res.data||[]).forEach(function(r){ m[r.key]=r.value; });
  S.tradeSubject  = m.trade    || DEFAULT_TRADE;
  S.cfg.school    = m.school   || '';
  S.cfg.term      = m.defterm  || '1st Term';
  API_KEY         = m.api_key  || '';
  // Pre-load admin settings cache for everyone (needed for school name etc.)
  await _fetchAdminSettings();
  // Override ADMIN.selectedTerm if admin
  if(CURRENT_USER.role==='admin'){
    ADMIN.selectedTerm = m.defterm || '1st Term';
  }
}
function showAuthScreen(){
  var s=$('screen-auth'); if(s) s.classList.add('visible');
  var nav=$('nav'); if(nav) nav.style.display='none';
  var sb=$('sidebar'); if(sb) sb.style.display='none';
  clearAuthErr(); setAuthLoading(false);
  var p=$('authPass'); if(p) p.value='';
}
function hideAuthScreen(){
  var s=$('screen-auth'); if(s) s.classList.remove('visible');
  var nav=$('nav'); if(nav) nav.style.display='';
  var sb=$('sidebar'); if(sb) sb.style.display='';
}

/* ── Boot the app after auth ────────── */
async function bootApp(){
  var chip=$('userChipName');
  if(chip) chip.textContent = (CURRENT_USER.name||CURRENT_USER.email).split(' ')[0];

  // Init app state from Supabase user_settings
  await _loadUserSettings();

  // Force role based on DB profile — admins cannot be faked
  ROLE = CURRENT_USER.role === 'admin' ? 'admin' : 'teacher';
  _applyRoleUI(ROLE);
  refreshApiStatus();
  startDeadlineWatcher();
  renderDash();
  $('screen-dash').style.display='block';
}

/* ── ROLE STATE ───────────────────── */
var ROLE = 'teacher'; // always set from DB, never from button click alone

function _applyRoleUI(role){

/* ══════════════════════════════════════
   FILE PROCESSING UTILITIES
   Handles PDF → canvas pages → base64
   Handles DOCX → plain text via mammoth
══════════════════════════════════════ */
async function pdfToImages(file){
  // Use PDF.js to render each page as a canvas image
  if(typeof pdfjsLib==='undefined'){ throw new Error('PDF.js not loaded. Try refreshing.'); }
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var arrayBuffer=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  var pages=[];
  for(var i=1;i<=Math.min(pdf.numPages,20);i++){
    var page=await pdf.getPage(i);
    var viewport=page.getViewport({scale:1.8});
    var canvas=document.createElement('canvas');
    canvas.width=viewport.width; canvas.height=viewport.height;
    var ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:viewport}).promise;
    pages.push({dataUrl:canvas.toDataURL('image/jpeg',0.88),mimeType:'image/jpeg',label:'PDF Page '+i});
  }
  return pages;
}

async function docxToText(file){
  if(typeof mammoth==='undefined'){ throw new Error('Mammoth.js not loaded. Try refreshing.'); }
  var arrayBuffer=await file.arrayBuffer();
  var result=await mammoth.extractRawText({arrayBuffer:arrayBuffer});
  return result.value||'';
}

async function processFileForScanner(file){
  var name=file.name||'file';
  var type=file.type||'';
  if(type.startsWith('image/')){ 
    return {type:'images',pages:[{dataUrl:await readFileAsDataURL(file),mimeType:type,label:name}]};
  }
  if(type==='application/pdf'||name.toLowerCase().endsWith('.pdf')){
    var pages=await pdfToImages(file);
    return {type:'images',pages:pages};
  }
  if(type.includes('word')||name.toLowerCase().endsWith('.docx')||name.toLowerCase().endsWith('.doc')){
    var text=await docxToText(file);
    return {type:'text',text:text,label:name};
  }
  throw new Error('Unsupported file type: '+name);
}

async function processFileForNTX(file){
  var name=file.name||'file';
  var type=file.type||'';
  if(type.startsWith('image/')){
    return {type:'image',dataUrl:await readFileAsDataURL(file),mimeType:type,label:name};
  }
  if(type==='application/pdf'||name.toLowerCase().endsWith('.pdf')){
    var pages=await pdfToImages(file);
    // For NTX we extract text from each rendered page
    return {type:'pdf_images',pages:pages,label:name};
  }
  if(type.includes('word')||name.toLowerCase().endsWith('.docx')||name.toLowerCase().endsWith('.doc')){
    var text=await docxToText(file);
    return {type:'text',text:text,label:name};
  }
  throw new Error('Unsupported file type: '+name);
}

function readFileAsDataURL(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){ res(e.target.result); };
    r.onerror=function(){ rej(new Error('Could not read: '+file.name)); };
    r.readAsDataURL(file);
  });
}

/* ══════════════════════════════════════
   API ENGINE — OpenRouter
══════════════════════════════════════ */
var _apiQueue=Promise.resolve();
var _minGap=800;
var _lastCall=0;
function _wait(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
async function _gapWait(){
  var now=Date.now(), gap=now-_lastCall;
  if(gap<_minGap) await _wait(_minGap-gap);
  _lastCall=Date.now();
}
async function extractApiError(resp){
  try{
    var j=await resp.json();
    var msg=(j&&j.error&&j.error.message)?j.error.message:'';
    if(resp.status===429||(msg&&msg.toLowerCase().includes('rate')))
      return{is429:true,seconds:10,msg:'Rate limit hit. Retrying shortly…'};
    if(resp.status===401) return{is429:false,msg:'Invalid API key.'};
    if(resp.status===402) return{is429:false,msg:'Insufficient OpenRouter credits. Top up at openrouter.ai/credits.'};
    return{is429:false,msg:msg||('API error '+resp.status)};
  }catch(e){ return{is429:resp.status===429,seconds:10,msg:'API error '+resp.status}; }
}
async function _fetchOR(messages,model,isJson){
  var body={model:model,messages:messages,max_tokens:4096,temperature:0.7};
  if(isJson) body.response_format={type:'json_object'};
  var r=await fetch(OR_BASE,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY,'HTTP-Referer':OR_REFERER,'X-Title':OR_TITLE},
    body:JSON.stringify(body)
  });
  if(!r.ok){ var info=await extractApiError(r); var e=new Error(info.msg); e.is429=info.is429; e.seconds=info.seconds||10; throw e; }
  var data=await r.json();
  return(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
}
async function _callWithRetry(messages,isJson){
  var models=[MODELS.primary,MODELS.fallback];
  var lastErr;
  for(var mi=0;mi<models.length;mi++){
    var attempts=0,max=3;
    while(attempts<max){
      try{ await _gapWait(); return await _fetchOR(messages,models[mi],isJson); }
      catch(e){
        lastErr=e; attempts++;
        if(e.is429&&attempts<max){
          var w=Math.max(e.seconds||10,10);
          toast('⏳ Rate limit — waiting '+w+'s…','warn',(w+2)*1000);
          updateApiStatus('waiting','waiting '+w+'s');
          await _wait(w*1000);
          updateApiStatus('ready');
        } else if(e.is429&&mi===0){ toast('⚡ Trying fallback model…','warn',2500); break; }
        else if(!e.is429){ break; }
      }
    }
  }
  throw lastErr||new Error('API unavailable.');
}
function updateApiStatus(state,msg){
  var dot=$('apiDot'),lbl=$('apiLbl'),qc=$('queueChip'),ql=$('queueLbl');
  if(!dot) return;
  if(state==='waiting'){
    dot.className='api-dot'; dot.style.background='var(--amber)';
    lbl.textContent='Rate limited';
    if(qc) qc.style.display='inline-flex';
    if(ql) ql.textContent=msg||'queuing…';
  } else {
    refreshApiStatus(); dot.style.background='';
    if(qc) qc.style.display='none';
  }
}
function parseJsonText(text){
  text=(text||'').replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
  try{ return JSON.parse(text); }catch(e){}
  var arrM=text.match(/\[\s*[\s\S]*\]/); if(arrM){ try{ return JSON.parse(arrM[0]); }catch(e2){} }
  var objM=text.match(/\{[\s\S]*\}/);
  if(objM){ try{ var o=JSON.parse(objM[0]); var keys=['questions','items','data','results']; for(var i=0;i<keys.length;i++){ if(Array.isArray(o[keys[i]])) return o[keys[i]]; } return o; }catch(e3){} }
  throw new Error('Could not parse API response as JSON.');
}
async function callGemini(prompt,opts){
  opts=opts||{};
  if(!API_KEY) throw new Error('No API key.');
  var sysInstr = opts.systemInstruction
    ? opts.systemInstruction
    : 'You are an expert Nigerian curriculum exam question generator. Always respond with valid JSON only — no explanation, no markdown, no code fences.';
  var messages=[
    {role:'system',content:sysInstr},
    {role:'user',content:prompt}
  ];
  var result=await(_apiQueue=_apiQueue.then(function(){ return _callWithRetry(messages,true); }));
  return parseJsonText(result);
}
async function callGeminiVision(base64Image,mimeType,prompt){
  if(!API_KEY) throw new Error('No API key configured.');
  mimeType=mimeType||'image/jpeg';
  var messages=[{role:'user',content:[{type:'image_url',image_url:{url:'data:'+mimeType+';base64,'+base64Image}},{type:'text',text:prompt}]}];
  var text=await(_apiQueue=_apiQueue.then(function(){ return _callWithRetry(messages,false); }));
  return parseJsonText(text);
}

async function callGeminiDraw(description, targetDims){
  if(!API_KEY) throw new Error('No API key.');
  // Default to medium size; caller can specify dimensions based on host layout
  var td = targetDims || {width:420, height:300, context:'standard A4 portrait'};
  var w = td.width, h = td.height, ctx = td.context || 'standard A4 portrait';
  var prompt='Generate a clean, labeled SVG diagram for a Nigerian secondary school exam paper.\n'
    +'Description: "'+description+'"\n'
    +'Target layout context: '+ctx+'\n\n'
    +'STRICT REQUIREMENTS:\n'
    +'1. Return ONLY the SVG element — no preamble, no explanation, no markdown.\n'
    +'2. SVG MUST use these EXACT dimensions: width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"\n'
    +'3. Use black/dark lines (#000 or #333) on white/transparent background only.\n'
    +'4. All labels must use font-size between 9 and 12 and be clearly readable.\n'
    +'5. Diagram must be scientifically/educationally accurate.\n'
    +'6. Clean and simple — suitable for black-and-white A4 printing.\n'
    +'7. IMPORTANT: fill the given '+w+'x'+h+' canvas EFFICIENTLY — do not leave excess whitespace padding, but do not overflow either. All content (shapes + labels) must be visible inside the viewBox.\n'
    +'8. If the diagram is inherently small (e.g., a simple triangle), scale it UP to use at least 70% of the canvas width/height.\n'
    +'9. Include a brief title element inside the SVG.\n'
    +'SVG CODE ONLY. Start with <svg and end with </svg>.';
  var messages=[
    {role:'system',content:'You are a scientific diagram generator for educational exam papers. Produce accurate, clean, labeled SVG diagrams sized EXACTLY to the specified dimensions. Return SVG code only — no prose, no markdown fences.'},
    {role:'user',content:prompt}
  ];
  var body={model:MODELS.drawing,messages:messages,max_tokens:3500,temperature:0.15};
  var r=await fetch(OR_BASE,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY,'HTTP-Referer':OR_REFERER,'X-Title':OR_TITLE},
    body:JSON.stringify(body)
  });
  if(!r.ok){ var info=await extractApiError(r); throw new Error(info.msg); }
  var data=await r.json();
  var text=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
  // Strip markdown fences if present
  text=text.replace(/^```[a-z]*\s*/i,'').replace(/```\s*$/,'').trim();
  var svgMatch=text.match(/<svg[\s\S]*?<\/svg>/i);
  if(!svgMatch) throw new Error('No valid SVG returned by AI. Try rephrasing the description.');
  return svgMatch[0];
}

/* Compute target diagram dimensions based on current layout mode.
   Used by the AI Layout Agent to request appropriately-sized diagrams. */
function getDiagramTargetDims(mode){
  var m=mode||'portrait';
  if(m==='split'){
    // Each quadrant is ~138mm × 180mm; diagram should fit in ~50% of that
    return {width:260, height:180, context:'Split 2-in-1 quadrant (tight space, ~138mm wide column)'};
  }
  if(m==='multi'){
    return {width:300, height:200, context:'Multi-Subject block (shared page with other subjects)'};
  }
  if(m==='landscape'){
    return {width:380, height:260, context:'Full Landscape A4 (2-column flow, generous space)'};
  }
  // portrait default
  return {width:420, height:300, context:'Portrait A4 (standard generous space)'};
}

/* Advisory check before diagram injection. Returns {canFit, advice, severity} —
   never blocks; merely informs admin. */
function advisDiagramFit(paper, mode){
  var height=estimatePaperHeight(paper);
  var advisory={canFit:true, advice:'', severity:'ok'};
  if(mode==='split'){
    // Split already tight; adding a diagram may overflow a quadrant
    var parts=divideIntoParts(paper);
    var hA=estimateQuestionsHeight(parts.partA)+80; // assume diagram adds 80pt
    var hB=estimateQuestionsHeight(parts.partB)+80;
    if(hA>265 || hB>265){
      advisory.canFit=false;
      advisory.severity='warn';
      advisory.advice='Diagram may crowd the Split 2-in-1 quadrant. Consider switching this paper to Full Landscape for better diagram readability. Proceeding anyway.';
    }
  }
  return advisory;
}

    +'<textarea class="fta" id="ftheoryAi" style="min-height:78px;" placeholder="e.g. Set 3 questions, make the second a diagram-based question. Focus on real-world application, not memorisation.">'+esc(c.theoryAiInstr||'')+'</textarea>'

  $('aca').onclick=function(){ S.at='C.A.'; s1Auto(); };
  $('fterm').onchange=function(e){ S.cfg.term=e.target.value; onClassTermChange(); };
  $('fcl').onchange=function(e){ S.cfg.cls=e.target.value; onClassTermChange(); };
  $('fst').onchange=function(e){
    S.cfg.std=e.target.value;
    var sc=$('stdCard');
    if(sc){
      var ex=sc.querySelector('.diff-wrap'); if(ex) ex.remove();
      if(S.cfg.std==='Custom/Internal'){ var dw=document.createElement('div'); dw.className='diff-wrap'; dw.innerHTML=renderDifficultyToggle(); sc.appendChild(dw); }

  $('fin').oninput=function(e){ S.cfg.instr=e.target.value; };
  $('ftp').oninput=function(e){ S.cfg.topicText=e.target.value; checkS1Ready(); };
  $('ftheoryPaper').oninput=function(e){ S.cfg.theoryPaperInstr=e.target.value; };
  $('ftheoryAi').oninput=function(e){ S.cfg.theoryAiInstr=e.target.value; };
  $('s1n').onclick=function(){
    var on=parseInt($('objN').value)||0;
    var fn=parseInt($('fitbN').value)||0;
    var tn=parseInt($('thN').value)||0;
    if(on+fn+tn===0){ toast('Set at least 1 question','warn'); return; }
    S.cfg.objN=Math.max(0,on); S.cfg.fitbN=Math.max(0,fn); S.cfg.thN=Math.max(0,tn);
    var tp=$('ftp'); if(tp&&tp.value.trim()){
      tp.value.split(',').map(function(t){ return t.trim(); }).filter(Boolean)
        .forEach(function(t){ if(!S.cfg.topics.includes(t)) S.cfg.topics.push(t); });
    }
    S.slots=[]; goWorkshop();
  };

  if(c.cls&&c.term) onClassTermChange();

/* ── Subject pills ── */
function renderSubjectPills(){

  var trade=getTradeById(S.tradeSubject);
  return list.map(function(s){
    var isTrade=(s==='Trade Subject');
    var displayName=isTrade?('🌱 '+trade.name):s;
    return '<div class="spill'+(isTrade?' trade-pill':'')+(s===S.cfg.subj?' sel':'')+'" onclick="selectSubject(\''+s.replace(/'/g,"\\'")+'\')">'
      +esc(displayName)+'</div>';
  }).join('');
}

window.selectSubject=function(s){
  S.cfg.subj=s;
  S.schemeWeeks=[]; S.schemeLoaded=false; S.cfg.topics=[];
  var sg=$('subjGrid'); if(sg) sg.innerHTML=renderSubjectPills();
  ['schemeCard','stdCard','qCard','thCard','metaCard'].forEach(function(id){

};

function renderTradePanel(){

window.pickTrade=function(id){

function renderSchemePrompt(){

  return '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'
    +'<button class="btn bq bsm" onclick="doLoadScheme()">📋 Load Scheme of Work</button>'
    +'<span style="font-size:12px;color:var(--mute);">Fetches verified NERDC 2026 weekly plan</span>'
    +'</div>';
}

  return '<div class="scheme-panel">'
    +'<div class="scheme-head" style="flex-wrap:wrap;gap:8px;align-items:center;">'
    +'<span class="scheme-head-txt">📋 '+esc(S.cfg.subj==='Trade Subject'?getTradeById(S.tradeSubject).name:S.cfg.subj)+' — '+esc(S.cfg.term)+'</span>'
    +(committed
      ?'<span class="scheme-locked-shield">🔒 Scheme Locked</span>'
        +'<button class="scheme-change-btn" onclick="confirmChangeScheme()" title="Replace committed scheme — requires confirmation">⚠ Change Scheme</button>'
      :'<span style="font-size:11px;color:var(--amber);font-weight:700;">⚠ Not yet committed — accept below to lock</span>'

      return '<div class="scheme-wk"><span class="scheme-wk-num">'+esc(w.week)+'</span>'

window.removeTag=function(i){ S.cfg.topics.splice(i,1); var tc=$('tagCloud'); if(tc) tc.innerHTML=renderTagCloud(); };
window.acceptScheme=async function(){
  S.cfg.topics=S.schemeWeeks.map(function(w){ return w.topic; });
  var actualSubj=S.cfg.subj==='Trade Subject'?getTradeById(S.tradeSubject).name:S.cfg.subj;
  await commitScheme(S.cfg.cls,actualSubj,S.cfg.term,S.schemeWeeks);
  S.schemeCommitted=true;
  var sa=$('schemeArea'); if(sa) sa.innerHTML=renderSchemePanel();
  var tc=$('tagCloud'); if(tc) tc.innerHTML=renderTagCloud();
  toast('🔒 Scheme committed — '+S.schemeWeeks.length+' weeks locked to memory','ok',4500);
  checkS1Ready();
};
window.editManually=function(){ var ta=$('ftp'); if(ta){ ta.focus(); ta.scrollIntoView({behavior:'smooth',block:'center'}); } };

function renderTagCloud(){
  if(!S.cfg.topics||!S.cfg.topics.length) return '<span class="tag-empty">No topics yet. Accept the scheme above or type manually.</span>';
  return S.cfg.topics.map(function(t,i){
    return '<div class="ttag">'+esc(t)+'<button class="ttag-x" onclick="removeTag('+i+')">×</button></div>';
  }).join('');
}

function checkS1Ready(){
  var btn=$('s1n'); if(!btn) return;
  var tp=$('ftp');
  var hasContent=S.schemeLoaded||(S.cfg.topics&&S.cfg.topics.length>0)||(tp&&tp.value.trim().length>0);
  var ok=!!(S.cfg.cls&&S.cfg.subj&&hasContent);
  btn.disabled=!ok;
}

function onClassTermChange(){
  S.cfg.subj=''; S.subjects=[]; S.schemeWeeks=[];
  S.schemeLoaded=false; S.schemeCommitted=false; S.cfg.topics=[];
  if(S.cfg.cls){
    S.subjects=getSubjectList(S.cfg.cls).slice();
    var sc=$('subjCard'); if(sc) sc.classList.add('unlocked');
  } else {
    S.subjects=[];
    var sc2=$('subjCard'); if(sc2) sc2.classList.remove('unlocked');
  }
  var sg=$('subjGrid'); if(sg) sg.innerHTML=renderSubjectPills();
  var note=$('subjFetchNote');
  if(note) note.innerHTML=S.cfg.cls?'<span style="color:var(--green);font-size:11px;">✓ NERDC 2026 subjects loaded ('+S.subjects.length+')</span>':'Select Term and Class to load subjects.';
  ['schemeCard','stdCard','qCard','thCard','metaCard'].forEach(function(id){ var el=$(id); if(el) el.classList.remove('unlocked'); });
  var sa=$('schemeArea'); if(sa) sa.innerHTML=renderSchemePrompt();
  var tc=$('tagCloud'); if(tc) tc.innerHTML=renderTagCloud();
  checkS1Ready();
}

window.confirmChangeScheme=async function(){
  var actualSubj=S.cfg.subj==='Trade Subject'?getTradeById(S.tradeSubject).name:S.cfg.subj;
  var msg='⚠ WARNING: This will permanently replace your committed scheme for:\n\n'
    +S.cfg.cls+' — '+actualSubj+' — '+S.cfg.term+'\n\n'
    +'A new scheme will be fetched from AI. This action cannot be undone.\n\n'
    +'Are you sure you want to replace the committed scheme?';
  if(!confirm(msg)) return;
  await clearCommittedScheme(S.cfg.cls,actualSubj,S.cfg.term);
  S.schemeCommitted=false; S.schemeWeeks=[]; S.schemeLoaded=false; S.cfg.topics=[];
  var tc=$('tagCloud'); if(tc) tc.innerHTML=renderTagCloud();
  toast('Fetching new scheme from AI…','info',2000);
  doLoadScheme();
};

window.doForceRefreshScheme=window.confirmChangeScheme; // legacy alias

window.doLoadScheme=async function(){
  if(!S.cfg.subj){ toast('Select a subject first','warn'); return; }

  var actualSubj=S.cfg.subj==='Trade Subject'?getTradeById(S.tradeSubject).name:S.cfg.subj;
  var cls=S.cfg.cls; var term=S.cfg.term;

  // Check for committed scheme first — serve immediately, no API call
  var committed=await loadCommittedScheme(cls,actualSubj,term);
  if(committed&&committed.length){
    S.schemeWeeks=committed; S.schemeLoaded=true; S.schemeCommitted=true;
    S.cfg.topics=committed.map(function(w){ return w.topic; });
    var sa0=$('schemeArea'); if(sa0) sa0.innerHTML=renderSchemePanel();
    var tc0=$('tagCloud'); if(tc0) tc0.innerHTML=renderTagCloud();
    toast('🔒 Committed scheme restored ('+committed.length+' weeks)','ok',4000);
    checkS1Ready();
    return;
  }

  var sa=$('schemeArea');
  if(sa) sa.innerHTML='<div class="banner b-info"><span class="spin">⟳</span> Fetching NERDC 2026 Scheme of Work via Gemini 2.5 Flash…</div>';

  // Determine level context for the prompt
  var levelCtx='';
  var cLow=cls.toLowerCase();
  if(cLow.includes('ss')){ levelCtx='Senior Secondary (SS) level. Topics must align with the WAEC/NECO/NERDC 2026 approved SS syllabus for this subject.'; }
  else if(cLow.includes('jss')){ levelCtx='Junior Secondary (JSS) level. Topics must align with the NERDC 2026 integrated Basic Education curriculum for JSS.'; }
  else if(cLow.includes('primary')){ levelCtx='Primary level. Topics must align with the NERDC 2026 revised Primary Education curriculum and continuous assessment framework.'; }
  else { levelCtx='Early Childhood / Pre-Primary level. Topics must align with the NERDC early years learning framework.'; }

  var termCtx=term==='1st Term'?'1st Term (foundational/introductory topics — definitions, basic concepts, introductory skills)':
    term==='2nd Term'?'2nd Term (intermediate topics — building on Term 1 concepts, more complex skills)':
    '3rd Term (advanced/application topics — synthesis, application, problem-solving, revision of core concepts)';

  var isVocational=(actualSubj.toLowerCase().includes('farming')||actualSubj.toLowerCase().includes('solar')||
    actualSubj.toLowerCase().includes('fashion')||actualSubj.toLowerCase().includes('beauty')||
    actualSubj.toLowerCase().includes('trade'));

  var prompt='You are a Nigerian curriculum specialist with authoritative knowledge of the NERDC 2026 Basic and Secondary Education syllabuses.\n\n'
    +'TASK: Generate the official NERDC 2026 Scheme of Work for the exact subject, class, and term below.\n\n'
    +'SUBJECT: '+actualSubj+'\n'
    +'CLASS: '+cls+' — '+levelCtx+'\n'
    +'TERM: '+termCtx+'\n\n'
    +'NERDC 2026 CURRICULUM FRAMEWORK NOTES:\n'
    +'- The 2026 revision reorganized content into themes, strands, and competency-based outcomes.\n'
    +'- SS topics follow the WAEC/NECO approved examination syllabus for that subject.\n'
    +'- JSS topics follow the integrated thematic NERDC Basic Education curriculum.\n'
    +'- A full Nigerian term has 10–13 CONTENT teaching weeks of substantive subject matter.\n'
    +(isVocational?'- For vocational/trade subjects: follow the NABTEB/NERDC vocational trade curriculum strands.\n':'')+'\n'
    +'MANDATORY RULES — each rule is NON-NEGOTIABLE:\n'
    +'1. ONLY include real, verifiable NERDC 2026 syllabus topics for this exact subject and class level.\n'
    +'2. NEVER include administrative weeks: Revision, Examination, Mid-Term Break, Resumption, Orientation, Closing, or any non-teaching week.\n'
    +'3. Topics must be SPECIFIC and SUBSTANTIVE — not vague. Wrong: "Introduction". Correct: "Cell Structure and the Cell Theory".\n'
    +'4. Topics must follow the NERDC syllabus SEQUENCE — progressive from foundational to complex within the term.\n'
    +'5. Topics must be TERM-APPROPRIATE — match the term context described above.\n'
    +'6. Each week must have a DISTINCT topic — no repetition, no padding, no filler weeks.\n'
    +'7. Subtopics must be 1–2 specific, actionable instructional content points per week.\n'
    +'8. Generate exactly the correct number of teaching weeks for this subject (10–13 weeks).\n\n'
    +'OUTPUT FORMAT:\n'
    +'Return ONLY a valid JSON array — no preamble, no explanation, no markdown, no code fences:\n'
    +'[\n'
    +'  {"week":"Week 1","topic":"Exact NERDC topic title","subtopics":"Specific content point 1; Specific content point 2"},\n'
    +'  {"week":"Week 2","topic":"Next topic","subtopics":"Content point 1; Content point 2"}\n'
    +']\n'
    +'JSON array ONLY.';

  callGeminiScheme(prompt)
    .then(function(weeks){
      S.schemeWeeks=Array.isArray(weeks)?weeks:[];
      // Validate: strip any week that looks like an admin week
      var banned=/\b(revision|examination|exam|break|resumption|orientation|closing|holiday|mock|test week)\b/i;
      S.schemeWeeks=S.schemeWeeks.filter(function(w){
        return w&&w.topic&&!banned.test(w.topic);
      });
      S.schemeLoaded=S.schemeWeeks.length>0;
      S.schemeCommitted=false;
      if(sa) sa.innerHTML=renderSchemePanel();
      checkS1Ready();
      if(S.schemeLoaded) toast('✓ Scheme loaded — '+S.schemeWeeks.length+' weeks. Click "Accept & Commit" to lock it.','ok',5000);
      else if(sa) sa.innerHTML='<div class="banner b-warn">⚠ AI returned an empty scheme. <button class="btn bq bsm" onclick="doLoadScheme()">↻ Retry</button></div>';
    })
    .catch(function(e){
      S.schemeLoaded=false;
      var retryBtn='<button class="btn bq bsm" style="margin-top:10px;" onclick="doLoadScheme()">↻ Retry</button>';
      if(e.is429){
        var secs=Math.max(e.seconds||65,65);
        if(sa){
          sa.innerHTML='<div class="banner b-warn" style="flex-direction:column;align-items:flex-start;">'
            +'<div><strong>⏳ Rate limit</strong> — auto-retrying in <strong id="schemeCountdown">'+secs+'</strong>s…</div>'
            +'<div style="margin-top:4px;font-size:11.5px;opacity:.8;">Type topics manually below in the meantime.</div>'
            +'</div>'+renderSchemePrompt();
          var rem=secs;
          var cd=setInterval(function(){ rem--; var el=$('schemeCountdown'); if(el) el.textContent=rem; if(rem<=0){ clearInterval(cd); doLoadScheme(); } },1000);
        }
      } else {
        if(sa) sa.innerHTML='<div class="banner b-warn">⚠ Could not load scheme: '+esc(e.message.substring(0,120))
          +retryBtn+'<div style="margin-top:6px;font-size:11.5px;color:var(--mute);">Type your topics manually below.</div></div>'+renderSchemePrompt();
      }
      checkS1Ready();
    });
};

/* ══════════════════════════════════════
   WORKSHOP
══════════════════════════════════════ */
function goWorkshop(){
  S.scr=2; hdr();
  $('s1').style.display='none';
  $('s2').style.display='block';
  $('s3').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});

  var c=S.cfg;
  var objN=Math.max(0,parseInt(c.objN)||0);
  var fitbN=Math.max(0,parseInt(c.fitbN)||0);
  var thN=Math.max(0,parseInt(c.thN)||0);

  if(!S.slots.length){
    S.slots=[];
    for(var i=0;i<objN;i++)  S.slots.push({id:i,           k:'obj',  q:null,included:true,loading:false,err:null});
    for(var j=0;j<fitbN;j++) S.slots.push({id:objN+j,      k:'fitb', q:null,included:true,loading:false,err:null});
    for(var k=0;k<thN;k++)   S.slots.push({id:objN+fitbN+k,k:'theory',q:null,included:true,loading:false,err:null});
  }
  renderWorkshop();
  if(API_KEY&&S.slots.some(function(s){ return !s.q; })) generateAll();
}

function renderWorkshop(){
  var c=S.cfg;
  var objSlots  = S.slots.filter(function(s){ return s.k==='obj'; });
  var fitbSlots = S.slots.filter(function(s){ return s.k==='fitb'; });
