<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teacher Profile Submission</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#1a1a1a;--ink-2:#444;--ink-3:#888;
    --cream:#faf8f4;--cream-2:#f2efe8;--cream-3:#e8e3d8;
    --gold:#b8860b;--gold-light:#f5e9c8;
    --green:#2d6a4f;--green-light:#d8f3dc;
    --red:#9b2335;--red-light:#fde8eb;
    --border:#ddd8cc;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

  .hero{background:var(--ink);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;}
  .hero-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#b8a87a;margin-bottom:10px;font-weight:600;}
  .hero h1{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:8px;}
  .hero p{font-size:14px;color:#ccc;max-width:460px;margin:0 auto;}
  .hero-meta{display:flex;justify-content:center;gap:20px;margin-top:1.25rem;flex-wrap:wrap;}
  .meta-item{font-size:12px;color:#aaa;}.meta-item strong{color:#e8d9b5;}

  .form-body{max-width:620px;margin:0 auto;padding:2rem 1rem 4rem;}
  .section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem;}
  .section-title{font-size:12px;font-weight:600;color:var(--ink-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:1.25rem;}

  .field{margin-bottom:1.1rem;}.field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--ink-2);margin-bottom:6px;}
  .req-star{color:var(--red);margin-left:2px;}
  .field input[type=text],.field input[type=number],.field textarea,.field select{
    width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;
    font-size:14px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);transition:border .2s;
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold);background:#fff;}
  .field textarea{resize:vertical;min-height:90px;}
  .field.error input,.field.error textarea,.field.error select{border-color:var(--red);}
  .err-msg{font-size:12px;color:var(--red);margin-top:4px;display:none;}
  .field.error .err-msg{display:block;}

  .checkbox-wrap{display:flex;align-items:center;gap:10px;padding:10px 0;}
  .checkbox-wrap input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
  .checkbox-wrap span{font-size:14px;color:var(--ink);}

  .photo-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .2s;}
  .photo-zone:hover,.photo-zone.drag{border-color:var(--gold);background:var(--gold-light);}
  .photo-zone.has-photo{border-style:solid;border-color:var(--green);}
  .photo-zone input{display:none;}
  .photo-icon{font-size:32px;margin-bottom:10px;}
  .photo-zone h3{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px;}
  .photo-zone p{font-size:12px;color:var(--ink-3);}
  .photo-zone .req-pill{display:inline-block;margin-top:10px;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--cream-2);color:var(--ink-3);font-weight:600;}
  .preview-wrap{display:none;flex-direction:column;align-items:center;gap:10px;}
  .preview-wrap img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid var(--green);}
  .preview-wrap .file-info{font-size:12px;color:var(--green);font-weight:500;}
  .preview-wrap .change-btn{font-size:12px;color:var(--ink-3);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'DM Sans',sans-serif;}
  .photo-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

  .req-box{background:var(--gold-light);border:1px solid #d4a843;border-radius:8px;padding:12px 14px;margin-top:12px;}
  .req-box p{font-size:12px;color:#7a5c00;line-height:1.8;}.req-box strong{color:#5a4000;}

  .submit-btn{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;margin-top:.5rem;letter-spacing:.3px;}
  .submit-btn:hover{background:#333;}

  .success-screen{display:none;text-align:center;padding:3rem 1.5rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius);}
  .success-icon{font-size:48px;margin-bottom:1rem;}
  .success-screen h2{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:8px;}
  .success-screen p{font-size:14px;color:var(--ink-3);}

  .deadline-banner{background:var(--red-light);border:1px solid #f5c0c8;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:1.25rem;display:none;}
  .custom-divider{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.8px;text-transform:uppercase;border-top:1px solid var(--cream-2);padding-top:14px;margin-top:6px;margin-bottom:14px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label" id="hero-label">School Magazine</div>
  <h1 id="hero-title">Teacher Profile Submission</h1>
  <p id="hero-subtitle">Please fill in your details below. Your profile will be featured in our magazine.</p>
  <div class="hero-meta" id="hero-meta"></div>
</div>

<div class="form-body">
  <div class="deadline-banner" id="deadline-banner"></div>
  <div id="form-container"></div>
  <div class="success-screen" id="success-screen">
    <div class="success-icon">🎉</div>
    <h2>Profile submitted!</h2>
    <p>Thank you. Your profile has been received and will be featured in the magazine.</p>
  </div>
</div>

<script>
const DEFAULT_SETTINGS = {
  schoolName:'Our School', edition:'Graduation Edition', deadline:'', contact:'',
  photoRequired:true, minWidth:400, minHeight:400, maxSize:2, formats:'jpg,png',
  customFields: [],
  fields:{
    name:          {enabled:true, required:true,  label:'Full name'},
    subject:       {enabled:true, required:true,  label:'Subjects taught / Class taught'},
    years:         {enabled:true, required:false, label:'Years at this school'},
    qualification: {enabled:true, required:false, label:'Highest qualification'},
    message:       {enabled:true, required:true,  label:'Message to students'},
    fun:           {enabled:true, required:false, label:'Fun fact / Hobbies'},
    nickname:      {enabled:false,required:false, label:'Nickname (if any)'},
    achievement:   {enabled:true, required:false, label:'Notable achievement'},
    favorite_quote:{enabled:true, required:false, label:'Favourite quote'},
    advice:        {enabled:false,required:false, label:'Career advice to students'},
  }
};

const PLACEHOLDERS = {
  name:'e.g. Mrs. Funmilayo Adeyemi',
  subject:'e.g. Mathematics / JSS 3A',
  years:'e.g. 5 years',
  qualification:'e.g. M.Ed, University of Ibadan',
  message:'Write a short personal message or advice to graduating students...',
  fun:'e.g. I love cooking and reading mystery novels',
  nickname:'e.g. "Mr. A"',
  achievement:'e.g. Best Teacher Award 2023',
  favorite_quote:'e.g. "Education is the passport to the future"',
  advice:'Share your career guidance for students...',
};
const TEXTAREA_FIELDS = ['message','advice','favorite_quote'];

const s = JSON.parse(localStorage.getItem('mag_admin_settings') || 'null') || DEFAULT_SETTINGS;
let photoFile = null, photoDataURL = null;

function init() {
  document.getElementById('hero-label').textContent   = s.edition || 'School Magazine';
  document.getElementById('hero-title').textContent   = (s.schoolName || 'School') + ' — Teacher Profiles';
  const meta = [];
  if (s.deadline) meta.push(`<div class="meta-item">Deadline: <strong>${new Date(s.deadline).toDateString()}</strong></div>`);
  if (s.contact)  meta.push(`<div class="meta-item">Help: <strong>${s.contact}</strong></div>`);
  document.getElementById('hero-meta').innerHTML = meta.join('');

  if (s.deadline && new Date() > new Date(s.deadline)) {
    const b = document.getElementById('deadline-banner');
    b.style.display = 'block';
    b.textContent = `⚠️ Submission deadline was ${new Date(s.deadline).toDateString()}. Please contact ${s.contact||'the production manager'} if you still need to submit.`;
  }
  buildForm();
}

function buildForm() {
  const container = document.getElementById('form-container');
  const enabledFields = Object.entries(s.fields).filter(([,v]) => v.enabled);
  const customFields  = s.customFields || [];
  const fmts = s.formats.toUpperCase().split(',').join(' or ');
  const reqLabel = s.photoRequired ? '<span class="req-star">*</span>' : '<span style="font-size:12px;color:var(--ink-3);font-weight:400;">(optional)</span>';

  let html = `<div class="section"><div class="section-title">Personal details</div>`;

  enabledFields.forEach(([id, cfg]) => {
    const isTA = TEXTAREA_FIELDS.includes(id);
    html += `<div class="field" id="wrap-${id}">
      <label for="f-${id}">${cfg.label}${cfg.required?'<span class="req-star">*</span>':''}</label>
      ${isTA
        ? `<textarea id="f-${id}" placeholder="${PLACEHOLDERS[id]||''}"></textarea>`
        : `<input type="text" id="f-${id}" placeholder="${PLACEHOLDERS[id]||''}" />`}
      <div class="err-msg">This field is required.</div>
    </div>`;
  });

  if (customFields.length) {
    html += `<div class="custom-divider">Additional information</div>`;
    customFields.forEach(cf => {
      if (!cf.label) return;
      html += `<div class="field" id="wrap-${cf.id}">
        <label for="f-${cf.id}">${escHtml(cf.label)}${cf.required?'<span class="req-star">*</span>':''}</label>`;

      if (cf.type === 'textarea') {
        html += `<textarea id="f-${cf.id}" placeholder="${escHtml(cf.placeholder||'')}"></textarea>`;
      } else if (cf.type === 'select') {
        const opts = (cf.options||'').split('\n').map(o=>o.trim()).filter(Boolean);
        html += `<select id="f-${cf.id}"><option value="">— Select an option —</option>${opts.map(o=>`<option value="${escHtml(o)}">${escHtml(o)}</option>`).join('')}</select>`;
      } else if (cf.type === 'checkbox') {
        html += `<div class="checkbox-wrap"><input type="checkbox" id="f-${cf.id}" /><span>${escHtml(cf.label)}</span></div>`;
      } else if (cf.type === 'number') {
        html += `<input type="number" id="f-${cf.id}" placeholder="${escHtml(cf.placeholder||'')}" />`;
      } else {
        html += `<input type="text" id="f-${cf.id}" placeholder="${escHtml(cf.placeholder||'')}" />`;
      }
      html += `<div class="err-msg">This field is required.</div></div>`;
    });
  }

  html += `</div>`;

  html += `<div class="section">
    <div class="section-title">Profile photo</div>
    <div class="photo-zone" id="photo-zone" onclick="document.getElementById('photo-input').click()"
         ondragover="dragOver(event)" ondragleave="dragLeave()" ondrop="dropPhoto(event)">
      <input type="file" id="photo-input" accept=".jpg,.jpeg,.png,.webp" onchange="handlePhoto(event)" />
      <div id="photo-placeholder">
        <div class="photo-icon">📷</div>
        <h3>Upload your profile photo ${reqLabel}</h3>
        <p>Click here or drag &amp; drop your photo</p>
        <span class="req-pill">Passport-style · Clear face · Plain background</span>
      </div>
      <div class="preview-wrap" id="preview-wrap">
        <img id="photo-preview" src="" alt="Preview" />
        <div class="file-info" id="file-info"></div>
        <button class="change-btn" onclick="resetPhoto(event)">Change photo</button>
      </div>
    </div>
    <div class="photo-err" id="photo-err"></div>
    <div class="req-box">
      <p>
        <strong>Photo requirements:</strong><br/>
        · Format: ${fmts}<br/>
        · Minimum size: <strong>${s.minWidth} × ${s.minHeight} pixels</strong><br/>
        · Maximum file size: <strong>${s.maxSize} MB</strong><br/>
        · Style: Passport-style, clear face, plain or neutral background, good lighting<br/>
        · Avoid: group photos, sunglasses, heavy filters, blurry images
      </p>
    </div>
  </div>
  <button class="submit-btn" onclick="submitForm()">Submit my profile</button>`;

  container.innerHTML = html;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function dragOver(e){e.preventDefault();document.getElementById('photo-zone').classList.add('drag');}
function dragLeave(){document.getElementById('photo-zone').classList.remove('drag');}
function dropPhoto(e){e.preventDefault();dragLeave();const f=e.dataTransfer.files[0];if(f)processPhoto(f);}
function handlePhoto(e){if(e.target.files[0])processPhoto(e.target.files[0]);}

function processPhoto(file) {
  const errEl = document.getElementById('photo-err');
  errEl.style.display = 'none';
  const maxBytes = s.maxSize * 1024 * 1024;
  const allowed  = s.formats.split(',').flatMap(f => [f.trim(), f.trim()==='jpg'?'jpeg':f.trim()]);
  const ext = file.name.split('.').pop().toLowerCase();
  if (!allowed.includes(ext)) {
    errEl.textContent = `Invalid format. Please upload a ${s.formats.toUpperCase().split(',').join(' or ')} file.`;
    errEl.style.display = 'block'; return;
  }
  if (file.size > maxBytes) {
    errEl.textContent = `File too large. Max ${s.maxSize} MB. Your file is ${(file.size/1024/1024).toFixed(1)} MB.`;
    errEl.style.display = 'block'; return;
  }
  const img = new Image(), url = URL.createObjectURL(file);
  img.onload = function() {
    if (img.width < s.minWidth || img.height < s.minHeight) {
      errEl.textContent = `Image too small. Minimum ${s.minWidth}×${s.minHeight}px. Your image is ${img.width}×${img.height}px.`;
      errEl.style.display = 'block'; URL.revokeObjectURL(url); return;
    }
    photoFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      photoDataURL = ev.target.result;
      document.getElementById('photo-preview').src = photoDataURL;
      document.getElementById('file-info').textContent = `${file.name} · ${img.width}×${img.height}px · ${(file.size/1024).toFixed(0)}KB`;
      document.getElementById('photo-placeholder').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'flex';
      document.getElementById('photo-zone').classList.add('has-photo');
    };
    reader.readAsDataURL(file);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function resetPhoto(e) {
  e.stopPropagation();
  photoFile = null; photoDataURL = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-preview').src = '';
  document.getElementById('photo-placeholder').style.display = 'block';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('photo-zone').classList.remove('has-photo');
}

function submitForm() {
  let valid = true;
  const data = {};

  Object.entries(s.fields).forEach(([id, cfg]) => {
    if (!cfg.enabled) return;
    const el = document.getElementById(`f-${id}`);
    const wrap = document.getElementById(`wrap-${id}`);
    if (!el) return;
    const val = el.value.trim();
    data[id] = { label: cfg.label, value: val };
    if (cfg.required && !val) { wrap.classList.add('error'); valid = false; }
    else wrap.classList.remove('error');
  });

  (s.customFields||[]).forEach(cf => {
    if (!cf.label) return;
    const el   = document.getElementById(`f-${cf.id}`);
    const wrap = document.getElementById(`wrap-${cf.id}`);
    if (!el) return;
    let val = cf.type === 'checkbox' ? (el.checked ? 'Yes' : 'No') : el.value.trim();
    data[cf.id] = { label: cf.label, value: val, type: cf.type };
    if (cf.required && cf.type !== 'checkbox' && !val) { wrap.classList.add('error'); valid = false; }
    else wrap.classList.remove('error');
  });

  if (s.photoRequired && !photoDataURL) {
    const err = document.getElementById('photo-err');
    err.textContent = 'A profile photo is required.';
    err.style.display = 'block';
    valid = false;
  }

  if (!valid) {
    (document.querySelector('.field.error') || document.getElementById('photo-err'))
      ?.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  const submission = {
    id: Date.now(),
    timestamp: new Date().toLocaleString(),
    data,
    photoData: photoDataURL || null,
    photoName: photoFile?.name || null
  };

  const all = JSON.parse(localStorage.getItem('mag_submissions') || '[]');
  all.push(submission);
  localStorage.setItem('mag_submissions', JSON.stringify(all));

  document.getElementById('form-container').style.display = 'none';
  document.getElementById('success-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior:'smooth' });
}

init();
</script>
</body>
</html>
