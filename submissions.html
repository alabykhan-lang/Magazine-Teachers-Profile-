<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Submissions — Magazine Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#1a1a1a;--ink-2:#444;--ink-3:#888;
    --cream:#faf8f4;--cream-2:#f2efe8;--cream-3:#e8e3d8;
    --gold:#b8860b;--gold-light:#f5e9c8;
    --green:#2d6a4f;--green-light:#d8f3dc;
    --red:#9b2335;--border:#ddd8cc;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding:2rem 1rem 4rem;}
  .page{max-width:780px;margin:0 auto;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1.5px solid var(--border);}
  .logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);}
  .logo span{color:var(--gold);}
  .nav-links{display:flex;gap:12px;}
  .nav-links a{font-size:13px;color:var(--ink-3);text-decoration:none;font-weight:500;}
  .nav-links a:hover{color:var(--ink);}
  h2{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px;}
  .subtitle{font-size:14px;color:var(--ink-3);margin-bottom:1.75rem;}
  .stats{display:flex;gap:12px;margin-bottom:1.75rem;flex-wrap:wrap;}
  .stat{flex:1;min-width:120px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;text-align:center;}
  .stat .num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);}
  .stat .lbl{font-size:12px;color:var(--ink-3);margin-top:2px;}
  .actions{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:#fff;color:var(--ink);transition:background 0.2s;}
  .btn:hover{background:var(--cream-2);}
  .btn-primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn-primary:hover{background:#333;}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red);}
  .btn-danger:hover{background:#7a1a29;}
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;}
  .card-top{display:flex;align-items:center;gap:14px;margin-bottom:1rem;}
  .avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--cream-3);flex-shrink:0;}
  .avatar-init{width:56px;height:56px;border-radius:50%;background:var(--gold-light);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--gold);flex-shrink:0;}
  .card-info .name{font-size:16px;font-weight:600;}
  .card-info .sub{font-size:13px;color:var(--ink-3);margin-top:2px;}
  .card-info .ts{font-size:11px;color:var(--cream-3);margin-top:3px;}
  .fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
  .field-item .fl{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:2px;}
  .field-item .fv{font-size:13px;color:var(--ink);}
  .field-full{grid-column:1/-1;}
  .del-btn{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;margin-top:10px;padding:0;}
  .empty{text-align:center;padding:3rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-3);}
  .empty h3{font-size:18px;font-family:'DM Serif Display',serif;color:var(--ink);margin-bottom:6px;}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div class="logo">Magazine<span>Pro</span></div>
    <div class="nav-links">
      <a href="admin.html">← Settings</a>
      <a href="form.html" target="_blank">View form ↗</a>
    </div>
  </div>

  <h2>Submissions</h2>
  <p class="subtitle">All teacher profile submissions. Export as text to send to Claude for formatting.</p>

  <div class="stats">
    <div class="stat"><div class="num" id="total-count">0</div><div class="lbl">Total submitted</div></div>
    <div class="stat"><div class="num" id="photo-count">0</div><div class="lbl">With photos</div></div>
    <div class="stat"><div class="num" id="today-count">0</div><div class="lbl">Today</div></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="exportAll()">Export all for Claude ↗</button>
    <button class="btn" onclick="exportCSV()">Download CSV</button>
    <button class="btn btn-danger" onclick="clearAll()">Clear all</button>
  </div>

  <div id="cards-container"></div>
</div>

<script>
let submissions = JSON.parse(localStorage.getItem('mag_submissions') || '[]');

function getInitials(name) {
  return (name||'??').trim().split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
}

function render() {
  const today = new Date().toDateString();
  document.getElementById('total-count').textContent = submissions.length;
  document.getElementById('photo-count').textContent = submissions.filter(s=>s.photoData).length;
  document.getElementById('today-count').textContent = submissions.filter(s=>new Date(s.id).toDateString()===today).length;

  const container = document.getElementById('cards-container');
  if (!submissions.length) {
    container.innerHTML = `<div class="empty"><h3>No submissions yet</h3><p>Share the form link with teachers and their profiles will appear here.</p></div>`;
    return;
  }
  container.innerHTML = submissions.map((sub,i) => {
    const name = sub.data?.name?.value || 'Unknown';
    const subject = sub.data?.subject?.value || '';
    const fields = Object.entries(sub.data||{}).filter(([k])=>k!=='name'&&k!=='subject');
    return `
      <div class="card" id="card-${sub.id}">
        <div class="card-top">
          ${sub.photoData
            ? `<img class="avatar" src="${sub.photoData}" alt="${name}" />`
            : `<div class="avatar-init">${getInitials(name)}</div>`}
          <div class="card-info">
            <div class="name">${name}</div>
            <div class="sub">${subject}</div>
            <div class="ts">Submitted: ${sub.timestamp}</div>
          </div>
        </div>
        <div class="fields-grid">
          ${fields.map(([,cfg])=>`
            <div class="field-item ${['message','advice','favorite_quote'].includes(cfg.label?.toLowerCase().replace(/ /g,'_'))?'field-full':''}">
              <div class="fl">${cfg.label}</div>
              <div class="fv">${cfg.value||'—'}</div>
            </div>`).join('')}
        </div>
        <button class="del-btn" onclick="deleteOne(${sub.id})">Remove this submission</button>
      </div>`;
  }).join('');
}

function deleteOne(id) {
  if (!confirm('Remove this submission?')) return;
  submissions = submissions.filter(s=>s.id!==id);
  localStorage.setItem('mag_submissions', JSON.stringify(submissions));
  render();
}

function clearAll() {
  if (!confirm(`Delete all ${submissions.length} submissions? This cannot be undone.`)) return;
  submissions = [];
  localStorage.setItem('mag_submissions', JSON.stringify(submissions));
  render();
}

function exportAll() {
  let txt = `TEACHER PROFILES FOR CLAUDE FORMATTING\n`;
  txt += `Exported: ${new Date().toLocaleString()}\n`;
  txt += `Total submissions: ${submissions.length}\n\n`;
  txt += '='.repeat(55) + '\n\n';
  txt += `INSTRUCTIONS FOR CLAUDE:\nPlease format each teacher profile below into a\nprofessional, print-ready magazine layout.\n\n` + '='.repeat(55) + '\n\n';

  submissions.forEach((sub,i) => {
    txt += `TEACHER PROFILE #${i+1}\n`;
    Object.entries(sub.data||{}).forEach(([,cfg]) => {
      txt += `${cfg.label}: ${cfg.value||'Not provided'}\n`;
    });
    txt += `Profile photo: ${sub.photoData ? `YES — ${sub.photoName || 'photo provided'}` : 'NOT provided'}\n`;
    txt += `\n${'—'.repeat(40)}\n\n`;
  });

  const blob = new Blob([txt],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'teacher_profiles_for_claude.txt';
  a.click();
}

function exportCSV() {
  if (!submissions.length) return;
  const headers = ['#','Submitted',...Object.values(submissions[0].data||{}).map(f=>f.label),'Has Photo'];
  const rows = submissions.map((sub,i)=>[
    i+1, sub.timestamp,
    ...Object.values(sub.data||{}).map(f=>`"${(f.value||'').replace(/"/g,'""')}"`),
    sub.photoData?'Yes':'No'
  ]);
  const csv = [headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'teacher_submissions.csv';
  a.click();
}

render();
</script>
</body>
</html>
